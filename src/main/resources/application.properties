# ============================================================
# [application.properties] Spring Boot 설정 파일
# ============================================================

# 서버 포트 설정
server.port=8082

# JSP 뷰 리졸버 설정
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# MySQL 데이터베이스 설정
spring.datasource.url=jdbc:mysql://localhost:3306/Accommodationdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=0000

# JPA / Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# SQL 초기화 설정
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

# JWT 설정
jwt.secret=MyMatzipSecretKeyForJwtTokenGenerationMustBeLongEnough2026
jwt.expiration=86400000

# 에러 메시지 설정 (개발용)
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true