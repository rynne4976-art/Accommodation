<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Accommodation</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <style>

        .hero{
            text-align:center;
            padding:120px 20px;
            background:linear-gradient(#f3f3f3,#e8e8e8);
        }

        .hero img{
            width:140px;
        }

        .hero h1{
            margin-top:20px;
            font-size:40px;
        }

        .search-box{
            margin-top:30px;
        }

        .search-box input{
            padding:12px;
            width:200px;
            margin:5px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .search-box button{
            padding:12px 18px;
            border:none;
            background:#d64545;
            color:white;
            border-radius:6px;
        }

        /* section */

        .section{
            max-width:1200px;
            margin:80px auto;
        }

        .section h2{
            margin-bottom:30px;
        }

        /* cards */

        .card-container{
            display:flex;
            gap:20px;
        }

        .card{
            flex:1;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card-body{
            padding:15px;
        }

    </style>

</head>

<body>

<div th:replace="layouts/header :: header"></div>


<!-- HERO -->

<section class="hero">

    <img src="/images/logo.png">

    <h1>Accommodation</h1>

    <div class="search-box">

        <input placeholder="Location">
        <input placeholder="Check-in">
        <input placeholder="Check-out">

        <button>Search</button>

    </div>

</section>


<!-- Popular -->

<section class="section">

    <h2>Popular Destinations</h2>

    <div class="card-container">

        <div class="card">
            <img src="/images/seoul.png">
            <div class="card-body">Seoul</div>
        </div>

        <div class="card">
            <img src="/images/busan.png">
            <div class="card-body">Busan</div>
        </div>

        <div class="card">
            <img src="/images/jeju.png">
            <div class="card-body">Jeju</div>
        </div>

        <div class="card">
            <img src="/images/gyeongju.png">
            <div class="card-body">Gyeongju</div>
        </div>

    </div>

</section>


<!-- Featured -->

<section class="section">

    <h2>Featured Listings</h2>

    <div class="card-container">

        <div class="card">
            <img src="/images/room1.png">
            <div class="card-body">
                Modern City Apartment<br>
                $120/night
            </div>
        </div>

        <div class="card">
            <img src="/images/room2.png">
            <div class="card-body">
                Beachside Hotel Room<br>
                $160/night
            </div>
        </div>

        <div class="card">
            <img src="/images/room3.png">
            <div class="card-body">
                Traditional Hanok Stay<br>
                $95/night
            </div>
        </div>

    </div>

</section>


<div th:replace="layouts/footer :: footer"></div>

</body>
</html>
