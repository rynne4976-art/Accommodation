<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>찜 목록</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/wish.css}">
</head>

<th:block layout:fragment="content">
    <section class="wish-page">
        <div class="wish-page__inner">
            <header class="wish-page__header" data-wish-header>
                <h1 class="wish-page__title">
                    찜한 숙소
                    <span class="wish-page__count-wrap">
                        <span class="wish-page__heart" aria-hidden="true">♥</span>
                    </span>
                </h1>
                <p class="wish-page__subtitle">마음에 든 숙소를 메인 카드와 같은 형식으로 비교해보세요.</p>
                <div class="wish-page__tabs">
                    <a class="wish-page__tab"
                       th:classappend="${selectedSort == 'priceDesc'} ? ' is-active' : ''"
                       th:href="@{/wish(sort='priceDesc')}">가격 높은 순</a>
                    <a class="wish-page__tab"
                       th:classappend="${selectedSort == 'priceAsc'} ? ' is-active' : ''"
                       th:href="@{/wish(sort='priceAsc')}">가격 낮은 순</a>
                    <a class="wish-page__tab"
                       th:classappend="${selectedSort == 'ratingDesc'} ? ' is-active' : ''"
                       th:href="@{/wish(sort='ratingDesc')}">평점 순</a>
                </div>
            </header>

            <div class="wish-page__content">
                <div class="wish-empty" data-wish-empty th:hidden="${wishCount > 0}">
                    <div class="wish-empty__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 20s-6.5-4.1-8.5-8C2 9.1 3.8 6 7.3 6c2 0 3.1 1.1 4.7 3 1.6-1.9 2.7-3 4.7-3C20.2 6 22 9.1 20.5 12c-2 3.9-8.5 8-8.5 8z"></path>
                        </svg>
                    </div>
                    <h2>아직 찜한 숙소가 없습니다.</h2>
                    <p>마음에 드는 숙소를 찜해두고 이곳에서 비교해보세요.</p>
                    <a th:href="@{/main}" class="wish-empty__action">숙소 보러 가기</a>
                </div>

                <div class="wish-list" data-wish-content th:hidden="${wishCount == 0}">
                    <article class="card accom-card"
                             th:each="wish : ${wishItems}"
                             data-wish-card>
                        <div class="accom-card__visual">
                            <button class="accom-card__wish is-active"
                                    type="button"
                                    aria-label="찜"
                                    aria-pressed="true"
                                    th:attr="data-accom-id=${wish.accomId}"
                                    data-wish-button>
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 20.5 4.8 13.8a4.9 4.9 0 0 1 6.9-6.9L12 7.2l.3-.3a4.9 4.9 0 0 1 6.9 6.9Z"/>
                                </svg>
                            </button>
                            <img class="accom-card__image"
                                 th:if="${wish.imgUrl != null and !#strings.isEmpty(wish.imgUrl)}"
                                 th:src="${wish.imgUrl}"
                                 th:alt="${wish.accomName}">
                            <div class="accom-card__image-placeholder"
                                 th:unless="${wish.imgUrl != null and !#strings.isEmpty(wish.imgUrl)}">
                                <span th:text="${wish.grade != null ? wish.grade.num : 'GRADE'}">GRADE</span>
                            </div>
                        </div>

                        <div class="card-body accom-info">
                            <div class="accom-card__badge-row"
                                 th:with="gradeNum=${wish.grade != null ? wish.grade.num : 0}">
                                <span class="accom-card__kind"
                                      th:text="${wish.accomType != null ? wish.accomType.label : '숙소'}">숙소</span>
                                <span class="accom-card__grade-stars" aria-label="숙소 등급">
                                    <span class="star filled"
                                          th:each="i : ${#numbers.sequence(1, gradeNum)}">&#9733;</span>
                                </span>
                            </div>
                            <h3 class="accom-card__title" th:text="${wish.accomName}">숙소명</h3>

                            <div class="accom-card__rating">
                                <span class="accom-card__score"
                                      th:text="${wish.avgRating != null ? #numbers.formatDecimal(wish.avgRating, 1, 1) : '0.0'}">0.0</span>
                                <div class="accom-card__rating-copy">
                                    <a class="accom-card__review-link"
                                       th:href="@{/reviews/accom/{id}(id=${wish.accomId})}"
                                       th:text="${wish.reviewCount != null ? #numbers.formatInteger(wish.reviewCount, 1, 'COMMA') + '개 후기' : '후기 0개'}">후기 0개</a>
                                </div>
                            </div>

                            <div class="accom-card__meta">
                                <div class="accom-card__location">
                                    <span th:text="${wish.location}">위치</span>
                                </div>
                                <div class="accom-card__desc">
                                    <span th:text="${wish.accomDetail}">상세 설명</span>
                                </div>
                            </div>

                            <div class="card-bottom accom-card__bottom">
                                <div class="accom-card__price-wrap">
                                    <span class="accom-card__price-label">1박 기준</span>
                                    <strong class="price"
                                            th:text="${#numbers.formatInteger(wish.pricePerNight, 3, 'COMMA')} + '원'">0원</strong>
                                </div>
                                <a class="reserve-btn" th:href="@{/accom/{accomId}(accomId=${wish.accomId})}">상세설명</a>
                            </div>
                        </div>
                    </article>
                    <div class="wish-list__footer">
                        <a th:href="@{/main}" class="wish-list__more">숙소 더 보러가기</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script th:src="@{/js/wish.js}"></script>
</th:block>
</html>
