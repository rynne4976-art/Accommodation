<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div ></div>


<div layout:fragment="content">
    <form action="/bookingUpdate">
        <div>
            <label>숙박업소명
                <input type="text" name="AccomNm">
            </label>
            <label>등급
                <input type="text" name="Stars">
            </label>
            <label>가격
                <input type="text" name="price">
            </label>
            <label>등록자 이름
                <input type="text" name="reg_name">
            </label>
            <label>등록자 전화번호
                <input type="text" name="reg_number">
            </label>
            <label>등록일
                <input type="datetime-local" name="reg_date">
            </label>
            <label>위치
                <input type="text" name="location">
            </label>
            <label>건물 이미지
                <input type="image" name="AccomImg">
            </label>
        </div>
        <div>
            <button type="submit">등록</button>
            <button type="reset">취소</button>
        </div>







    </form>


</div>

</body>
</html>
