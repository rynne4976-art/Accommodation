<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">
<head>
    <meta charset="UTF-8">
    <title>숙소 상세</title>
    <link rel="stylesheet" th:href="@{/css/accomDtl.css}">
</head>

<div layout:fragment="content">

    <div class="container accom-detail-page">
        <div class="row">
            <div class="col-md-6">
                <div th:if="${accom.accomImgList != null and !#lists.isEmpty(accom.accomImgList)}">
                    <img th:src="${accom.accomImgList[0].imgUrl}"
                         class="img-fluid accom-detail-main-image"
                         alt="숙소 대표 이미지">

                    <div class="accom-detail-thumb-list">
                        <img th:each="img : ${accom.accomImgList}"
                             th:src="${img.imgUrl}"
                             class="accom-detail-thumb"
                             alt="숙소 이미지">
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h2 class="accom-detail-title" th:text="${accom.accomName}">숙소명</h2>
                <div class="accom-detail-meta">
                <p><strong>숙소 유형:</strong> <span th:text="${accom.accomType}"></span></p>
                <p><strong>등급:</strong> <span th:text="${accom.grade}"></span></p>
                <p><strong>위치:</strong> <span th:text="${accom.location}"></span></p>
                <p><strong>1박 가격:</strong> <span th:text="${#numbers.formatInteger(accom.pricePerNight, 3, 'COMMA')}"></span>원</p>
                <p><strong>상세 설명:</strong> <span th:text="${accom.accomDetail}"></span></p>
                <p><strong>평균 별점:</strong> <span th:text="${#numbers.formatDecimal(accom.avgRating, 1, 1)}"></span></p>
                <p><strong>리뷰 수:</strong> <span th:text="${accom.reviewCount}"></span></p>
                </div>

                <div class="accom-detail-actions">
                    <a th:href="@{/orders/accom/{accomId}(accomId=${accom.id})}" class="btn btn-primary">
                        예약하기
                    </a>

                    <a th:href="@{/review/accom/{accomId}(accomId=${accom.id})}" class="btn btn-outline-secondary">
                        리뷰 보기
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>
</html>
