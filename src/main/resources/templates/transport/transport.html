<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">

<head>

    <meta charset="UTF-8">
    <title>교통 안내</title>

    <link rel="stylesheet" th:href="@{/css/transport.css}">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div layout:fragment="content">

    <section class="transport-page">

        <div class="transport-container">

            <header class="transport-header">

                <p class="transport-label">TRIP MOBILITY</p>

                <h1>숙소 주변 교통과 길찾기</h1>

                <p class="transport-desc">
                    현재 위치 또는 출발지를 입력하여 숙소까지 이동 경로를 확인하세요
                </p>

            </header>


            <div class="stay-card">

                <div class="stay-info">

                    <div class="stay-icon">🏨</div>

                    <div>

                        <span>선택한 숙소</span>

                        <h2 th:text="${accom != null ? accom.accomName : '숙소를 선택하세요'}"></h2>

                        <p id="accomAddress"
                           th:text="${accom != null ? accom.location : ''}">
                        </p>

                    </div>

                </div>

                <input type="hidden"
                       id="accomLocation"
                       th:value="${accom != null ? accom.location : ''}">

            </div>


            <div class="route-search">

                <input
                        type="text"
                        id="startLocation"
                        placeholder="출발 위치 입력 (예: 강남역)">

                <button onclick="searchRoute()">길찾기</button>

                <button onclick="useMyLocation()">내 위치</button>

            </div>


            <div class="route-map-card">

                <div id="map" class="naver-map"></div>

                <p id="distanceInfo" class="route-info">
                    출발지를 입력하거나 내 위치를 사용하세요
                </p>

            </div>


        </div>

    </section>

    <script th:src="@{/js/transport-map.js}"></script>

</div>

</body>
</html>
