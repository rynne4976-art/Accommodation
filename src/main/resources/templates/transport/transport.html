<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">

<head>
    <meta charset="UTF-8">
    <title>교통/렌트카</title>

    <link rel="stylesheet" th:href="@{/css/transport.css}">

</head>

<body>

<div layout:fragment="content">

    <section class="transport-page">

        <div class="transport-container">

            <!-- 헤더 -->
            <header class="transport-header">

                <p class="transport-label">TRIP MOBILITY</p>

                <h1>
                    현재 위치와 숙소 주변 교통을 한 번에 확인하세요
                </h1>

                <p class="transport-desc">
                    현재 위치에서 숙소까지 거리와 주변 교통 정보를 확인할 수 있습니다.
                </p>

            </header>


            <!-- 숙소 기본 정보(이름/주소). 주소는 JS에서 좌표 변환에 사용 -->
            <div class="stay-card">

                <span>선택한 숙소 기준</span>

                <h2 th:text="${accom != null ? accom.accomName : '숙소를 선택하세요'}"></h2>

                <p id="accomAddress"
                   th:text="${accom != null ? accom.location : ''}">
                </p>
                <input type="hidden" id="accomLocation" th:value="${accom != null ? accom.location : ''}">

                <!-- 숙소가 없을 때 메인 페이지로 이동할 수 있는 버튼 -->
                <a th:if="${accom == null}" th:href="@{/}" class="select-accom-btn">
                    숙소 선택하기
                </a>

            </div>

            <!-- 요청하신 3개 지도:
                 1) 현재 위치 → 숙소
                 2) 현재 위치 → 최근접 지하철
                 3) 현재 위치 → 최근접 버스정류장 -->
            <div class="route-map-grid">

                <div class="route-map-card">
                    <h3>현재 위치 → 숙소</h3>
                    <div id="mapToAccom" class="naver-map"></div>
                    <p id="distanceInfo" class="route-info">위치 확인 중...</p>
                </div>

                <div class="route-map-card">
                    <h3>가장 가까운 지하철</h3>
                    <div id="mapToSubway" class="naver-map"></div>
                    <p id="subwayInfo" class="route-info">검색 중...</p>
                </div>

                <div class="route-map-card">
                    <h3>가장 가까운 버스</h3>
                    <div id="mapToBus" class="naver-map"></div>
                    <p id="busInfo" class="route-info">검색 중...</p>
                </div>

            </div>

        </div>

    </section>

    <!-- layout fragment 내부에 있어야 실제 페이지에 스크립트가 포함됩니다 -->
    <script th:src="@{/js/transport-map.js}"></script>
    <script type="text/javascript"
            th:src="|https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${naverMapClientId}&submodules=geocoder,geometry&callback=initTransportMap|">
    </script>

</div>

</body>

</html>
