<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <style>
        /* ── 예약 내역 섹션 ── */
        .order-section {
            max-width: 980px;
            margin: 0 auto 88px;
            padding: 0 16px;
        }

        .order-section__title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 24px;
        }

        /* ── 필터 카드 ── */
        .filter-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 22px 24px 0;
            margin-bottom: 28px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 20px;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
            white-space: nowrap;
        }

        .period-btns { display: flex; gap: 6px; }

        .period-btn {
            padding: 6px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            background: #fff;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            transition: all 0.15s;
        }

        .period-btn:hover { border-color: #111827; color: #111827; }

        .period-btn.active {
            background: #111827;
            border-color: #111827;
            color: #fff;
            font-weight: 700;
        }

        .date-range { display: flex; align-items: center; gap: 8px; }

        .date-input {
            padding: 7px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            color: #334155;
            background: #fff;
            outline: none;
            transition: border-color 0.15s;
        }

        .date-input:focus { border-color: #111827; }

        .date-sep { color: #94a3b8; }

        .btn-search {
            padding: 8px 24px;
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-search:hover { background: #1f2937; }

        /* ── 상태 탭 ── */
        .status-tabs {
            display: flex;
            border-top: 1px solid #e2e8f0;
            padding: 0 2px;
        }

        .status-tab {
            padding: 13px 18px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .status-tab:hover { color: #111827; }

        .status-tab.active {
            color: #111827;
            font-weight: 700;
            border-bottom-color: #111827;
        }

        .status-tab + .status-tab::before {
            content: '|';
            margin-right: 18px;
            color: #e2e8f0;
        }

        /* ── 결과 카운트 ── */
        .result-count {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .result-count strong { color: #111827; }

        /* ── 주문 카드 ── */
        .order-empty {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            text-align: center;
            padding: 64px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .order-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.18s;
        }

        .order-card:hover { box-shadow: 0 4px 20px rgba(15,23,42,0.08); }

        .order-card__top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 13px 20px;
            font-size: 13px;
            color: #64748b;
        }

        .order-card__id { font-weight: 700; color: #334155; }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-badge--confirmed { background: #dbeafe; color: #1d4ed8; }
        .status-badge--completed { background: #d1fae5; color: #065f46; }
        .status-badge--cancel    { background: #fee2e2; color: #b91c1c; }

        .order-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-top: 1px solid #f1f5f9;
        }

        .order-item:last-of-type { margin-bottom: 0; }

        .order-item__img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 10px;
            background: #e2e8f0;
            flex-shrink: 0;
        }

        .order-item__info { flex: 1; min-width: 0; }

        .order-item__name {
            font-size: 15px;
            font-weight: 700;
            color: #101828;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .order-item__meta {
            font-size: 13px;
            color: #667085;
            line-height: 1.7;
        }

        .order-item__price {
            font-size: 15px;
            font-weight: 700;
            color: #101828;
            white-space: nowrap;
        }

        .order-card__footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 20px;
            border-top: 1px solid #f1f5f9;
        }

        .btn-detail {
            padding: 7px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #475569;
            background: #fff;
            font-size: 13px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-detail:hover { background: #f1f5f9; }

        .btn-order-cancel {
            padding: 7px 16px;
            border: 1px solid #111827;
            border-radius: 8px;
            background: #111827;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-order-cancel:hover { background: #1f2937; }

        .btn-order-cancel:disabled {
            background: #f2f4f7;
            border-color: #e2e8f0;
            color: #98a2b3;
            cursor: default;
        }

        /* ── 페이지네이션 ── */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 28px;
        }

        .page-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            color: #475569;
            text-decoration: none;
            background: #fff;
            transition: all 0.15s;
        }

        .page-btn:hover { border-color: #111827; color: #111827; }

        .page-btn.active {
            background: #111827;
            border-color: #111827;
            color: #fff;
            font-weight: 700;
        }

        .page-btn.disabled {
            color: #cbd5e1;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .date-range { width: 100%; }
            .date-input { flex: 1; }
            .btn-search { width: 100%; }
            .status-tab { padding: 12px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div th:replace="~{layouts/header :: header}"></div>

    <main class="mypage-wrap">
        <section class="mypage-hero">
            <span class="mypage-label">My Page</span>
            <h2 th:text="${member.name} + '님, 반갑습니다.'">회원명님, 반갑습니다.</h2>
            <p>가입한 기본 정보와 계정 상태를 한 화면에서 확인할 수 있습니다.</p>
        </section>

        <section class="mypage-card">
            <div class="mypage-card-header">
                <h3>기본 정보</h3>
                <span class="mypage-role" th:text="${member.role}">USER</span>
            </div>

            <div class="mypage-alert success" th:if="${param.profileUpdated}">
                회원 정보가 수정되었습니다.
            </div>
            <div class="mypage-alert success" th:if="${param.passwordUpdated}">
                비밀번호가 변경되었습니다.
            </div>
            <div class="mypage-alert success" th:if="${profileUpdatedMessage}">
                <span th:text="${profileUpdatedMessage}">안내 메시지</span>
            </div>

            <div class="mypage-grid">
                <div class="mypage-item">
                    <span class="mypage-item-label">이름</span>
                    <strong th:text="${member.name}">홍길동</strong>
                </div>
                <div class="mypage-item">
                    <span class="mypage-item-label">이메일</span>
                    <strong th:text="${member.email}">user@example.com</strong>
                </div>
                <div class="mypage-item">
                    <span class="mypage-item-label">휴대폰 번호</span>
                    <strong th:text="${member.number == T(com.Accommodation.constant.SocialMemberDefaults).DEFAULT_NUMBER ? '입력된 정보 없음' : member.formattedNumber}">010-0000-0000</strong>
                </div>
                <div class="mypage-item">
                    <span class="mypage-item-label">가입일</span>
                    <strong th:text="${#temporals.format(member.regTime, 'yyyy-MM-dd HH:mm')}">2026-04-02 12:00</strong>
                </div>
                <div class="mypage-item mypage-item-wide">
                    <span class="mypage-item-label">주소</span>
                    <strong th:text="${member.address == T(com.Accommodation.constant.SocialMemberDefaults).DEFAULT_ADDRESS ? '입력된 정보 없음' : member.address}">서울시 강남구</strong>
                </div>
            </div>

            <div class="mypage-action-row">
                <a th:href="@{/members/mypage/edit}" class="mypage-action-link">정보 수정</a>
                <a th:if="${!member.socialMember}" th:href="@{/members/mypage/password}" class="mypage-action-link mypage-action-link-secondary">비밀번호 변경</a>
            </div>
        </section>
    </main>

    <!-- 예약 내역 -->
    <section class="order-section">
        <h3 class="order-section__title">예약 내역</h3>

        <!-- 필터 카드 -->
        <div class="filter-card">
            <form id="filterForm" method="get" th:action="@{/members/mypage}">
                <input type="hidden" name="status" th:value="${selectedStatus}">
                <input type="hidden" name="page" value="0">

                <div class="filter-row">
                    <span class="filter-label">기간</span>

                    <div class="period-btns">
                        <button type="button" class="period-btn"
                                th:classappend="${selectedPeriod == '1w'} ? ' active'"
                                onclick="setPeriod('1w')">1주일</button>
                        <button type="button" class="period-btn"
                                th:classappend="${selectedPeriod == '1m'} ? ' active'"
                                onclick="setPeriod('1m')">1개월</button>
                        <button type="button" class="period-btn"
                                th:classappend="${selectedPeriod == '3m'} ? ' active'"
                                onclick="setPeriod('3m')">3개월</button>
                        <button type="button" class="period-btn"
                                th:classappend="${selectedPeriod == '12m'} ? ' active'"
                                onclick="setPeriod('12m')">12개월</button>
                    </div>

                    <input type="hidden" id="periodInput" name="period" th:value="${selectedPeriod}">

                    <div class="date-range">
                        <input type="date" id="fromInput" name="from" class="date-input"
                               th:value="${fromDate}" onchange="clearPeriod()">
                        <span class="date-sep">–</span>
                        <input type="date" id="toInput" name="to" class="date-input"
                               th:value="${toDate}" onchange="clearPeriod()">
                    </div>

                    <button type="submit" class="btn-search">조회</button>
                </div>
            </form>

            <!-- 상태 탭 -->
            <div class="status-tabs">
                <a class="status-tab"
                   th:classappend="${selectedStatus == '예약완료'} ? ' active'"
                   th:href="@{/members/mypage(period=${selectedPeriod}, from=${fromDate}, to=${toDate}, status='예약완료', page=0)}">예약완료</a>
                <a class="status-tab"
                   th:classappend="${selectedStatus == '이용완료'} ? ' active'"
                   th:href="@{/members/mypage(period=${selectedPeriod}, from=${fromDate}, to=${toDate}, status='이용완료', page=0)}">이용완료</a>
                <a class="status-tab"
                   th:classappend="${selectedStatus == '취소완료'} ? ' active'"
                   th:href="@{/members/mypage(period=${selectedPeriod}, from=${fromDate}, to=${toDate}, status='취소완료', page=0)}">취소완료</a>
            </div>
        </div>

        <!-- 결과 건수 -->
        <p class="result-count">총 <strong th:text="${totalCount}">0</strong>건</p>

        <!-- 빈 상태 -->
        <div th:if="${#lists.isEmpty(orders)}" class="order-empty">
            <p>해당 기간에 예약 내역이 없습니다.</p>
        </div>

        <!-- 주문 카드 -->
        <div th:each="order : ${orders}"
             class="order-card"
             th:attr="data-order-id=${order.orderId}"
             onclick="goToOrderDetail(this)">

            <div class="order-card__top">
                <div style="display:flex; align-items:center; gap:16px;">
                    <span class="order-card__id" th:text="'예약번호 ' + ${order.orderId}"></span>
                    <span th:text="${#temporals.format(order.orderDate, 'yyyy.MM.dd HH:mm')}"></span>
                </div>
                <span class="status-badge"
                      th:classappend="${order.displayStatus == '예약완료'} ? ' status-badge--confirmed'
                                    : (${order.displayStatus == '이용완료'} ? ' status-badge--completed'
                                    : ' status-badge--cancel')"
                      th:text="${order.displayStatus}"></span>
            </div>

            <div th:each="item : ${order.orderItemDtos}" class="order-item">
                <img class="order-item__img"
                     th:src="${#strings.isEmpty(item.imgUrl) ? '/images/no-image.png' : item.imgUrl}"
                     th:alt="${item.accomName}">
                <div class="order-item__info">
                    <div class="order-item__name" th:text="${item.accomName}">숙소명</div>
                    <div class="order-item__meta">
                        <div th:text="${#temporals.format(item.checkInDate, 'yyyy.MM.dd')}
                                      + ' ~ '
                                      + ${#temporals.format(item.checkOutDate, 'yyyy.MM.dd')}"></div>
                        <div th:text="${item.count + '박 · 성인 ' + item.adultCount + '명'}
                                      + ${item.childCount > 0 ? ' · 아동 ' + item.childCount + '명' : ''}
                                      + ' · 객실 ' + item.roomCount + '실'"></div>
                    </div>
                </div>
                <div class="order-item__price"
                     th:text="${#numbers.formatInteger(item.totalPrice, 3, 'COMMA')} + '원'">0원</div>
            </div>

            <div class="order-card__footer">
                <a th:href="@{/orders/{id}(id=${order.orderId})}"
                   class="btn-detail"
                   onclick="event.stopPropagation()">상세 보기</a>
                <button class="btn-order-cancel"
                        th:disabled="${order.displayStatus != '예약완료'}"
                        th:data-order-id="${order.orderId}"
                        onclick="cancelOrder(this, event)">예약 취소</button>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-btn"
               th:classappend="${currentPage == 0} ? ' disabled'"
               th:href="@{/members/mypage(period=${selectedPeriod}, from=${fromDate}, to=${toDate}, status=${selectedStatus}, page=${currentPage - 1})}">&#8249;</a>

            <th:block th:with="startPage=${T(java.lang.Math).max(0, currentPage - 2)},
                               endPage=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
                <a th:each="i : ${#numbers.sequence(startPage, endPage)}"
                   class="page-btn"
                   th:classappend="${i == currentPage} ? ' active'"
                   th:text="${i + 1}"
                   th:href="@{/members/mypage(period=${selectedPeriod}, from=${fromDate}, to=${toDate}, status=${selectedStatus}, page=${i})}"></a>
            </th:block>

            <a class="page-btn"
               th:classappend="${currentPage >= totalPages - 1} ? ' disabled'"
               th:href="@{/members/mypage(period=${selectedPeriod}, from=${fromDate}, to=${toDate}, status=${selectedStatus}, page=${currentPage + 1})}">&#8250;</a>
        </div>
    </section>

<div th:replace="~{layouts/footer :: footer}"></div>

<script th:inline="javascript">
    function getCsrfHeader() {
        return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }
    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }

    function goToOrderDetail(element) {
        const orderId = element.getAttribute('data-order-id');
        if (!orderId) return;
        window.location.href = '/orders/' + orderId;
    }

    function setPeriod(p) {
        document.getElementById('periodInput').value = p;
        document.getElementById('fromInput').value = '';
        document.getElementById('toInput').value = '';
        document.getElementById('filterForm').submit();
    }

    function clearPeriod() {
        document.getElementById('periodInput').value = '';
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    }

    function cancelOrder(btn, event) {
        if (event) event.stopPropagation();
        if (!confirm('예약을 취소하시겠습니까?')) return;
        const orderId = btn.getAttribute('data-order-id');

        fetch('/order/' + orderId + '/cancel', {
            method: 'POST',
            headers: { [getCsrfHeader()]: getCsrfToken() }
        })
        .then(res => {
            if (res.ok) { alert('예약이 취소되었습니다.'); location.reload(); }
            else return res.text().then(msg => { throw new Error(msg); });
        })
        .catch(err => alert('취소 실패: ' + err.message));
    }
</script>
</body>
</html>
