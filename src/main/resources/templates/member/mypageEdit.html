<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/member-auth.css}">
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <title>회원정보 수정</title>
    <style>
        .auth-form .field-error {
            display: block;
            min-height: 16px;
            margin-top: 4px;
            line-height: 1.25;
            visibility: hidden;
        }

        .auth-form .field-error.is-visible {
            visibility: visible;
        }

        .auth-form .field-error.is-success {
            color: #16a34a;
        }

        .auth-form .field-error.is-error {
            color: #ef4444;
        }
    </style>
</head>
<body>
<div th:replace="~{layouts/header :: header}"></div>

<main class="auth-wrap">
    <section class="auth-card">
        <span class="auth-label">Edit Profile</span>
        <h2>회원정보 수정</h2>
        <p class="auth-description">이름, 휴대폰 번호, 주소를 수정할 수 있습니다.</p>

        <div class="auth-alert error" th:if="${reservationInfoRequiredMessage}">
            <p th:text="${reservationInfoRequiredMessage}"></p>
        </div>

        <div class="auth-alert error" th:if="${errorMessage}">
            <p th:text="${errorMessage}"></p>
        </div>

        <form class="auth-form" th:action="@{/members/mypage/edit}" th:object="${memberUpdateDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group" th:if="${!socialMember}">
                <label>현재 비밀번호</label>
                <input type="password" th:field="*{currentPassword}" placeholder="현재 비밀번호를 입력하세요" autocomplete="current-password"
                       th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid' : ''">
                <p class="field-error"
                   data-field-error="currentPassword"
                   th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-visible is-error' : ''"
                   th:text="${#fields.hasErrors('currentPassword')} ? ${#fields.errors('currentPassword')[0]} : ''"></p>
            </div>

            <div class="form-group">
                <label>이름</label>
                <input type="text" th:field="*{name}" placeholder="이름을 입력하세요"
                       data-validate="name"
                       th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                <p class="field-error"
                   data-field-error="name"
                   th:classappend="${#fields.hasErrors('name')} ? ' is-visible is-error' : ''"
                   th:text="${#fields.hasErrors('name')} ? ${#fields.errors('name')[0]} : ''"></p>
            </div>

            <div class="form-group">
                <label>휴대폰 번호</label>
                <input type="hidden" th:field="*{number}" id="number">
                <div class="phone-field" data-phone-field>
                    <select id="phonePrefix" class="phone-part phone-prefix" aria-label="휴대폰 앞자리">
                        <option value="010">010</option>
                        <option value="011">011</option>
                        <option value="016">016</option>
                        <option value="017">017</option>
                        <option value="018">018</option>
                        <option value="019">019</option>
                    </select>
                    <span class="phone-separator">-</span>
                    <input type="text" id="phoneMiddle" class="phone-part" inputmode="numeric" maxlength="4" placeholder="0000" aria-label="휴대폰 가운데 4자리">
                    <span class="phone-separator">-</span>
                    <input type="text" id="phoneLast" class="phone-part" inputmode="numeric" maxlength="4" placeholder="0000" aria-label="휴대폰 마지막 4자리">
                </div>
                <p class="field-error"
                   data-field-error="number"
                   th:classappend="${#fields.hasErrors('number')} ? ' is-visible is-error' : ''"
                   th:text="${#fields.hasErrors('number')} ? ${#fields.errors('number')[0]} : ''"></p>
            </div>

            <div class="form-group">
                <label>주소</label>
                <div class="address-search-row">
                    <input type="text" th:field="*{postcode}" placeholder="우편번호" readonly data-validate="postcode">
                    <button type="button" class="address-search-button" id="addressSearchButton">주소 검색</button>
                </div>
                <input type="text" th:field="*{address}" placeholder="기본 주소" readonly data-validate="address">
                <input type="text" th:field="*{detailAddress}" placeholder="상세 주소를 입력하세요" data-validate="detailAddress">
                <p class="field-error"
                   data-field-error="addressGroup"
                   th:classappend="${#fields.hasErrors('postcode') or #fields.hasErrors('address') or #fields.hasErrors('detailAddress')} ? ' is-visible is-error' : ''"
                   th:text="${#fields.hasErrors('postcode')} ? ${#fields.errors('postcode')[0]} : (${#fields.hasErrors('address')} ? ${#fields.errors('address')[0]} : (${#fields.hasErrors('detailAddress')} ? ${#fields.errors('detailAddress')[0]} : ''))"></p>
            </div>

            <button class="auth-submit" type="submit">수정 완료</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/members/mypage}">마이페이지로 돌아가기</a>
        </div>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        let tabNavigationActive = false;

        document.addEventListener('keydown', function (event) {
            tabNavigationActive = event.key === 'Tab';
        });

        document.addEventListener('mousedown', function () {
            tabNavigationActive = false;
        });

        document.querySelectorAll('.auth-form input:not([type="hidden"]):not([readonly])').forEach(function (inputEl) {
            inputEl.addEventListener('focus', function () {
                if (!tabNavigationActive) {
                    return;
                }

                requestAnimationFrame(function () {
                    inputEl.select();
                });
            });
        });

        function selectInputValue(inputEl) {
            if (!inputEl || inputEl.readOnly || inputEl.type === 'hidden') {
                return;
            }

            requestAnimationFrame(function () {
                inputEl.select();
            });
        }

        function setInputInvalid(inputEl, invalid) {
            if (!inputEl) {
                return;
            }
            inputEl.classList.toggle('is-invalid', invalid);
        }

        const hiddenNumber = document.getElementById('number');
        const prefixInput = document.getElementById('phonePrefix');
        const middleInput = document.getElementById('phoneMiddle');
        const lastInput = document.getElementById('phoneLast');
        const form = hiddenNumber ? hiddenNumber.form : null;

        if (hiddenNumber && prefixInput && middleInput && lastInput && form) {
            function digitsOnly(value) {
                return (value || '').replace(/\D/g, '');
            }

            function setFieldFeedback(fieldName, message, type) {
                const errorEl = document.querySelector('[data-field-error="' + fieldName + '"]');
                if (!errorEl) {
                    return;
                }

                errorEl.textContent = message || '';
                errorEl.classList.toggle('is-visible', Boolean(message));
                errorEl.classList.toggle('is-success', type === 'success' && Boolean(message));
                errorEl.classList.toggle('is-error', type === 'error' && Boolean(message));
            }

            function validatePhoneField() {
                const digits = digitsOnly(hiddenNumber.value);
                const phoneFieldEl = document.querySelector('[data-phone-field]');
                let message = '';
                let type = '';

                if (!digits) {
                    message = '휴대폰 번호는 필수 입력 값입니다.';
                    type = 'error';
                } else if (!/^01[016789]\d{7,8}$/.test(digits)) {
                    message = '휴대폰 번호를 정확히 입력해주세요.';
                    type = 'error';
                } else {
                    message = '사용할 수 있는 휴대폰 번호입니다.';
                    type = 'success';
                }

                setFieldFeedback('number', message, type);
                if (phoneFieldEl) {
                    phoneFieldEl.classList.toggle('is-invalid', type === 'error');
                }
                return type !== 'error';
            }

            function syncHiddenNumber() {
                const prefix = digitsOnly(prefixInput.value).slice(0, 3);
                const middle = digitsOnly(middleInput.value).slice(0, 4);
                const last = digitsOnly(lastInput.value).slice(0, 4);
                hiddenNumber.value = middle || last ? prefix + middle + last : '';
            }

            function applySavedNumber(value) {
                const digits = digitsOnly(value);

                if (!digits) {
                    prefixInput.value = '010';
                    middleInput.value = '';
                    lastInput.value = '';
                    hiddenNumber.value = '';
                    return;
                }

                if (digits.length >= 3) {
                    prefixInput.value = digits.slice(0, 3);
                }
                if (digits.length >= 7) {
                    middleInput.value = digits.slice(3, 7);
                    lastInput.value = digits.slice(7, 11);
                } else if (digits.length > 3) {
                    middleInput.value = digits.slice(3);
                }

                syncHiddenNumber();
            }

            function bindNumericInput(currentInput, nextInput) {
                function syncCurrentInput() {
                    currentInput.value = digitsOnly(currentInput.value).slice(0, 4);
                    syncHiddenNumber();
                    validatePhoneField();

                    if (currentInput.value.length === 4 && nextInput) {
                        nextInput.focus();
                        selectInputValue(nextInput);
                    }
                }

                currentInput.addEventListener('input', syncCurrentInput);
                currentInput.addEventListener('change', syncCurrentInput);
                currentInput.addEventListener('blur', validatePhoneField);
            }

            prefixInput.addEventListener('change', function () {
                syncHiddenNumber();
                validatePhoneField();
            });
            bindNumericInput(middleInput, lastInput);
            bindNumericInput(lastInput, null);
            form.addEventListener('submit', function (event) {
                syncHiddenNumber();
                if (!validatePhoneField()) {
                    event.preventDefault();
                }
            });
            applySavedNumber(hiddenNumber.value);
        }

        const postcodeInput = document.getElementById('postcode');
        const addressInput = document.getElementById('address');
        const detailAddressInput = document.getElementById('detailAddress');
        const addressSearchButton = document.getElementById('addressSearchButton');

        if (postcodeInput && addressInput && detailAddressInput && addressSearchButton && window.kakao && window.kakao.Postcode) {
            addressSearchButton.addEventListener('click', function () {
                new kakao.Postcode({
                    oncomplete: function (data) {
                        let address = '';
                        let extraAddress = '';

                        if (data.userSelectedType === 'R') {
                            address = data.roadAddress;

                            if (data.bname && /[동로가]$/g.test(data.bname)) {
                                extraAddress += data.bname;
                            }

                            if (data.buildingName && data.apartment === 'Y') {
                                extraAddress += extraAddress ? ', ' + data.buildingName : data.buildingName;
                            }

                            if (extraAddress) {
                                address += ' (' + extraAddress + ')';
                            }
                        } else {
                            address = data.jibunAddress;
                        }

                        postcodeInput.value = data.zonecode;
                        addressInput.value = address;
                        postcodeInput.dispatchEvent(new Event('blur'));
                        addressInput.dispatchEvent(new Event('blur'));
                        detailAddressInput.focus();
                    }
                }).open();
            });
        }

        function toggleInputError(inputEl, message) {
            if (!inputEl) {
                return { valid: true, type: '' };
            }
            const fieldName = inputEl.dataset.validate === 'detailAddress' ? 'addressGroup' : inputEl.dataset.validate;
            const errorEl = fieldName ? document.querySelector('[data-field-error="' + fieldName + '"]') : null;
            if (!errorEl) {
                return { valid: true, type: '' };
            }
            errorEl.textContent = message || '';
            errorEl.classList.toggle('is-visible', Boolean(message));
            errorEl.classList.toggle('is-success', false);
            errorEl.classList.toggle('is-error', Boolean(message));
            setInputInvalid(inputEl, Boolean(message));
            return { valid: !message, type: message ? 'error' : '' };
        }

        const validators = {
            name: function (inputEl) {
                const value = (inputEl.value || '').trim();
                if (!value) {
                    return toggleInputError(inputEl, '이름은 필수 입력 값입니다.');
                }
                const errorEl = document.querySelector('[data-field-error="name"]');
                if (errorEl) {
                    errorEl.textContent = '사용할 수 있는 이름입니다.';
                    errorEl.classList.add('is-visible', 'is-success');
                    errorEl.classList.remove('is-error');
                }
                setInputInvalid(inputEl, false);
                return { valid: true, type: 'success' };
            },
            postcode: function (inputEl) {
                const value = (inputEl.value || '').trim();
                if (!value) {
                    return toggleInputError(inputEl, '우편번호는 필수 입력 값입니다.');
                }
                if (!/^\d{5}$/.test(value)) {
                    return toggleInputError(inputEl, '우편번호 5자리를 확인해주세요.');
                }
                const detailValue = (document.getElementById('detailAddress').value || '').trim();
                const errorEl = document.querySelector('[data-field-error="addressGroup"]');
                if (errorEl) {
                    const message = detailValue ? '사용할 수 있는 주소 정보입니다.' : '';
                    errorEl.textContent = message;
                    errorEl.classList.toggle('is-visible', Boolean(message));
                    errorEl.classList.toggle('is-success', Boolean(message));
                    errorEl.classList.remove('is-error');
                }
                setInputInvalid(inputEl, false);
                setInputInvalid(document.getElementById('address'), false);
                return { valid: true, type: 'success' };
            },
            address: function (inputEl) {
                const value = (inputEl.value || '').trim();
                if (!value) {
                    return toggleInputError(inputEl, '주소 검색을 통해 기본 주소를 입력해주세요.');
                }
                return validators.postcode(document.getElementById('postcode'));
            },
            detailAddress: function (inputEl) {
                const value = (inputEl.value || '').trim();
                if (!value) {
                    return toggleInputError(inputEl, '상세 주소를 입력해주세요.');
                }
                const postcodeValue = (document.getElementById('postcode').value || '').trim();
                const addressValue = (document.getElementById('address').value || '').trim();
                if (!postcodeValue || !addressValue) {
                    return toggleInputError(inputEl, '주소 검색을 통해 기본 주소를 입력해주세요.');
                }
                const errorEl = document.querySelector('[data-field-error="addressGroup"]');
                if (errorEl) {
                    errorEl.textContent = '사용할 수 있는 주소 정보입니다.';
                    errorEl.classList.add('is-visible', 'is-success');
                    errorEl.classList.remove('is-error');
                }
                setInputInvalid(document.getElementById('postcode'), false);
                setInputInvalid(document.getElementById('address'), false);
                setInputInvalid(inputEl, false);
                return { valid: true, type: 'success' };
            }
        };

        document.querySelectorAll('[data-validate]').forEach(function (inputEl) {
            const key = inputEl.dataset.validate;
            const validator = validators[key];
            if (!validator) {
                return;
            }
            inputEl.addEventListener('blur', function () {
                validator(inputEl);
            });
        });
    });
</script>
</body>
</html>
