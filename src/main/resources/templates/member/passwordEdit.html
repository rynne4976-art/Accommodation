<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/member-auth.css}">
    <title>비밀번호 변경</title>
</head>
<body>
<div th:replace="~{layouts/header :: header}"></div>

<main class="auth-wrap">
    <section class="auth-card">
        <span class="auth-label">Password</span>
        <h2>비밀번호 변경</h2>
        <p class="auth-description">현재 비밀번호를 확인한 뒤 새 비밀번호로 변경합니다.</p>

        <div class="auth-alert error" th:if="${errorMessage}">
            <p th:text="${errorMessage}"></p>
        </div>

        <form class="auth-form" th:action="@{/members/mypage/password}" th:object="${passwordChangeDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>현재 비밀번호</label>
                <input type="password" th:field="*{currentPassword}" placeholder="현재 비밀번호를 입력하세요">
                <p class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>
            </div>

            <div class="form-group">
                <label>새 비밀번호</label>
                <input type="password" th:field="*{newPassword}" placeholder="8자 이상 16자 이하">
                <p class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>
            </div>

            <div class="form-group">
                <label>새 비밀번호 확인</label>
                <input type="password" th:field="*{confirmPassword}" placeholder="새 비밀번호를 다시 입력하세요">
                <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
            </div>

            <button class="auth-submit" type="submit">비밀번호 변경</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/members/mypage}">마이페이지로 돌아가기</a>
        </div>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>
</body>
</html>
