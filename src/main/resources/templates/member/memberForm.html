<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/member-auth.css}">
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <title>회원가입</title>
</head>
<body>

<div th:replace="~{layouts/header :: header}"></div>

<main class="auth-wrap">
    <section class="auth-card">
        <span class="auth-label">Create Account</span>
        <h2>회원가입</h2>
        <p class="auth-description">기본 정보를 입력하고 계정을 생성하면 바로 로그인할 수 있습니다.</p>

        <div class="auth-alert error" th:if="${errorMessage}">
            <p th:text="${errorMessage}"></p>
        </div>

        <form class="auth-form" th:action="@{/members/new}" th:object="${memberFormDto}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>이름</label>
                <input type="text" th:field="*{name}" placeholder="이름을 입력하세요">
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="form-group">
                <label>이메일</label>
                <input type="email" th:field="*{email}" placeholder="이메일을 입력하세요">
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" th:field="*{password}" placeholder="8자 이상 16자 이하">
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

            <div class="form-group">
                <label>휴대폰 번호</label>
                <input type="hidden" th:field="*{number}" id="number">
                <div class="phone-field" data-phone-field>
                    <select id="phonePrefix" class="phone-part phone-prefix" aria-label="휴대폰 앞자리">
                        <option value="010">010</option>
                        <option value="011">011</option>
                        <option value="016">016</option>
                        <option value="017">017</option>
                        <option value="018">018</option>
                        <option value="019">019</option>
                    </select>
                    <span class="phone-separator">-</span>
                    <input type="text" id="phoneMiddle" class="phone-part" inputmode="numeric" maxlength="4" placeholder="0000" aria-label="휴대폰 가운데 4자리">
                    <span class="phone-separator">-</span>
                    <input type="text" id="phoneLast" class="phone-part" inputmode="numeric" maxlength="4" placeholder="0000" aria-label="휴대폰 마지막 4자리">
                </div>
                <p class="field-error" th:if="${#fields.hasErrors('number')}" th:errors="*{number}"></p>
            </div>

            <div class="form-group">
                <label>주소</label>
                <div class="address-search-row">
                    <input type="text" th:field="*{postcode}" placeholder="우편번호" readonly>
                    <button type="button" class="address-search-button" id="addressSearchButton">주소 검색</button>
                </div>
                <input type="text" th:field="*{address}" placeholder="기본 주소" readonly>
                <input type="text" th:field="*{detailAddress}" placeholder="상세 주소를 입력하세요">
                <p class="field-error" th:if="${#fields.hasErrors('postcode')}" th:errors="*{postcode}"></p>
                <p class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></p>
            </div>

            <button class="auth-submit" type="submit">회원가입</button>
        </form>

        <div class="auth-links">
            이미 계정이 있다면 <a th:href="@{/members/login}">로그인</a>
        </div>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const hiddenNumber = document.getElementById('number');
        const prefixInput = document.getElementById('phonePrefix');
        const middleInput = document.getElementById('phoneMiddle');
        const lastInput = document.getElementById('phoneLast');
        const form = hiddenNumber ? hiddenNumber.form : null;

        if (!hiddenNumber || !prefixInput || !middleInput || !lastInput || !form) {
            return;
        }

        function digitsOnly(value) {
            return (value || '').replace(/\D/g, '');
        }

        function syncHiddenNumber() {
            const prefix = digitsOnly(prefixInput.value).slice(0, 3);
            const middle = digitsOnly(middleInput.value).slice(0, 4);
            const last = digitsOnly(lastInput.value).slice(0, 4);
            hiddenNumber.value = prefix + middle + last;
        }

        function applySavedNumber(value) {
            const digits = digitsOnly(value);

            if (digits.length >= 3) {
                prefixInput.value = digits.slice(0, 3);
            }
            if (digits.length >= 7) {
                middleInput.value = digits.slice(3, 7);
                lastInput.value = digits.slice(7, 11);
            } else if (digits.length > 3) {
                middleInput.value = digits.slice(3);
            }

            syncHiddenNumber();
        }

        function bindNumericInput(currentInput, nextInput) {
            currentInput.addEventListener('input', function () {
                currentInput.value = digitsOnly(currentInput.value).slice(0, 4);
                syncHiddenNumber();

                if (currentInput.value.length === 4 && nextInput) {
                    nextInput.focus();
                }
            });
        }

        prefixInput.addEventListener('change', syncHiddenNumber);
        bindNumericInput(middleInput, lastInput);
        bindNumericInput(lastInput, null);

        form.addEventListener('submit', syncHiddenNumber);

        applySavedNumber(hiddenNumber.value);

        const postcodeInput = document.getElementById('postcode');
        const addressInput = document.getElementById('address');
        const detailAddressInput = document.getElementById('detailAddress');
        const addressSearchButton = document.getElementById('addressSearchButton');

        if (postcodeInput && addressInput && detailAddressInput && addressSearchButton && window.kakao && window.kakao.Postcode) {
            addressSearchButton.addEventListener('click', function () {
                new kakao.Postcode({
                    oncomplete: function (data) {
                        let address = '';
                        let extraAddress = '';

                        if (data.userSelectedType === 'R') {
                            address = data.roadAddress;

                            if (data.bname && /[동로가]$/g.test(data.bname)) {
                                extraAddress += data.bname;
                            }

                            if (data.buildingName && data.apartment === 'Y') {
                                extraAddress += extraAddress ? ', ' + data.buildingName : data.buildingName;
                            }

                            if (extraAddress) {
                                address += ' (' + extraAddress + ')';
                            }
                        } else {
                            address = data.jibunAddress;
                        }

                        postcodeInput.value = data.zonecode;
                        addressInput.value = address;
                        detailAddressInput.focus();
                    }
                }).open();
            });
        }
    });
</script>

</body>
</html>
