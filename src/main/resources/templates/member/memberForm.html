<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/member-auth.css}">
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <title>회원가입</title>
</head>
<body>

<div th:replace="~{layouts/header :: header}"></div>

<main class="auth-wrap">
    <section class="auth-card">
        <span class="auth-label">Create Account</span>
        <h2>회원가입</h2>
        <p class="auth-description">기본 정보를 입력하고 계정을 생성하면 바로 로그인할 수 있습니다.</p>

        <div class="auth-alert error" th:if="${errorMessage}">
            <p th:text="${errorMessage}"></p>
        </div>

        <form class="auth-form" th:action="@{/members/new}" th:object="${memberFormDto}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>이름</label>
                <input type="text" th:field="*{name}" placeholder="이름을 입력하세요" data-validate-field="name">
                <p class="field-error"
                   data-field-error="name"
                   th:text="${#fields.hasErrors('name')} ? ${#fields.errors('name')[0]} : ''"
                   th:classappend="${#fields.hasErrors('name')} ? ' is-visible' : ''"></p>
            </div>

            <div class="form-group">
                <label>이메일</label>
                <input type="email" th:field="*{email}" placeholder="이메일을 입력하세요" data-validate-field="email">
                <p class="field-error"
                   data-field-error="email"
                   th:text="${#fields.hasErrors('email')} ? ${#fields.errors('email')[0]} : ''"
                   th:classappend="${#fields.hasErrors('email')} ? ' is-visible' : ''"></p>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" th:field="*{password}" placeholder="8자 이상 16자 이하" data-validate-field="password">
                <ul class="password-checklist" id="passwordChecklist">
                    <li class="password-checklist__item" data-password-rule="length">8자 이상 16자 이하</li>
                    <li class="password-checklist__item" data-password-rule="letter">영문 포함</li>
                    <li class="password-checklist__item" data-password-rule="number">숫자 포함</li>
                    <li class="password-checklist__item" data-password-rule="special">특수문자 포함</li>
                </ul>
                <p class="field-error"
                   data-field-error="password"
                   th:text="${#fields.hasErrors('password')} ? ${#fields.errors('password')[0]} : ''"
                   th:classappend="${#fields.hasErrors('password')} ? ' is-visible' : ''"></p>
            </div>

            <div class="form-group">
                <label>비밀번호 확인</label>
                <input type="password" th:field="*{confirmPassword}" placeholder="비밀번호를 다시 입력하세요" data-validate-field="confirmPassword">
                <p class="field-error"
                   data-field-error="confirmPassword"
                   th:text="${#fields.hasErrors('confirmPassword')} ? ${#fields.errors('confirmPassword')[0]} : ''"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-visible' : ''"></p>
            </div>

            <div class="form-group">
                <label>휴대폰 번호</label>
                <input type="hidden" th:field="*{number}" id="number">
                <div class="phone-field" data-phone-field data-validate-field-wrapper="number">
                    <select id="phonePrefix" class="phone-part phone-prefix" aria-label="휴대폰 앞자리">
                        <option value="010">010</option>
                        <option value="011">011</option>
                        <option value="016">016</option>
                        <option value="017">017</option>
                        <option value="018">018</option>
                        <option value="019">019</option>
                    </select>
                    <span class="phone-separator">-</span>
                    <input type="text" id="phoneMiddle" class="phone-part" inputmode="numeric" maxlength="4" placeholder="0000" aria-label="휴대폰 가운데 4자리">
                    <span class="phone-separator">-</span>
                    <input type="text" id="phoneLast" class="phone-part" inputmode="numeric" maxlength="4" placeholder="0000" aria-label="휴대폰 마지막 4자리">
                </div>
                <p class="field-error"
                   data-field-error="number"
                   th:text="${#fields.hasErrors('number')} ? ${#fields.errors('number')[0]} : ''"
                   th:classappend="${#fields.hasErrors('number')} ? ' is-visible' : ''"></p>
            </div>

            <div class="form-group">
                <label>주소</label>
                <div class="address-search-row">
                    <input type="text" th:field="*{postcode}" placeholder="우편번호" readonly data-validate-field="postcode">
                    <button type="button" class="address-search-button" id="addressSearchButton">주소 검색</button>
                </div>
                <input type="text" th:field="*{address}" placeholder="기본 주소" readonly data-validate-field="address">
                <input type="text" th:field="*{detailAddress}" placeholder="상세 주소를 입력하세요">
                <p class="field-error"
                   data-field-error="addressGroup"
                   th:text="${#fields.hasErrors('postcode')} ? ${#fields.errors('postcode')[0]} : (${#fields.hasErrors('address')} ? ${#fields.errors('address')[0]} : '')"
                   th:classappend="${#fields.hasErrors('postcode') or #fields.hasErrors('address')} ? ' is-visible' : ''"></p>
            </div>

            <button class="auth-submit" type="submit">회원가입</button>
        </form>

        <div class="auth-links">
            이미 계정이 있다면 <a th:href="@{/members/login}">로그인</a>
        </div>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const hiddenNumber = document.getElementById('number');
        const prefixInput = document.getElementById('phonePrefix');
        const middleInput = document.getElementById('phoneMiddle');
        const lastInput = document.getElementById('phoneLast');
        const form = hiddenNumber ? hiddenNumber.form : null;
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordChecklist = document.getElementById('passwordChecklist');
        let emailCheckToken = 0;

        if (!hiddenNumber || !prefixInput || !middleInput || !lastInput || !form || !nameInput || !emailInput || !passwordInput || !confirmPasswordInput || !passwordChecklist) {
            return;
        }

        function digitsOnly(value) {
            return (value || '').replace(/\D/g, '');
        }

        function syncHiddenNumber() {
            const prefix = digitsOnly(prefixInput.value).slice(0, 3);
            const middle = digitsOnly(middleInput.value).slice(0, 4);
            const last = digitsOnly(lastInput.value).slice(0, 4);
            hiddenNumber.value = prefix + middle + last;
        }

        function setFieldFeedback(fieldName, message, type) {
            const errorEl = document.querySelector('[data-field-error="' + fieldName + '"]');
            if (!errorEl) {
                return;
            }

            errorEl.textContent = message || '';
            errorEl.classList.toggle('is-visible', Boolean(message));
            errorEl.classList.toggle('is-success', type === 'success' && Boolean(message));
            errorEl.classList.toggle('is-error', type === 'error' && Boolean(message));
        }

        function setInputInvalid(input, invalid) {
            if (!input) {
                return;
            }
            input.classList.toggle('is-invalid', invalid);
        }

        function setPhoneInvalid(invalid) {
            const phoneField = document.querySelector('[data-validate-field-wrapper="number"]');
            if (!phoneField) {
                return;
            }
            phoneField.classList.toggle('is-invalid', invalid);
            [prefixInput, middleInput, lastInput].forEach(function (field) {
                field.classList.toggle('is-invalid', invalid);
            });
        }

        function updatePasswordChecklist() {
            const value = passwordInput.value;
            const rules = {
                length: value.length >= 8 && value.length <= 16,
                letter: /[A-Za-z]/.test(value),
                number: /\d/.test(value),
                special: /[^A-Za-z\d]/.test(value)
            };

            passwordChecklist.querySelectorAll('[data-password-rule]').forEach(function (item) {
                const matched = Boolean(rules[item.getAttribute('data-password-rule')]);
                item.classList.toggle('is-valid', matched);
            });
        }

        function validateName(options = {}) {
            const { showEmpty = false } = options;
            const value = nameInput.value.trim();
            if (!value) {
                return showEmpty ? { message: '이름을 입력해주세요.', type: 'error' } : { message: '', type: '' };
            }
            return { message: '사용할 수 있는 이름입니다.', type: 'success' };
        }

        function validateEmailFormat(options = {}) {
            const { showEmpty = false } = options;
            const value = emailInput.value.trim();
            if (!value) {
                return showEmpty ? { message: '이메일을 입력해주세요.', type: 'error' } : { message: '', type: '' };
            }
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(value)) {
                return { message: '이메일 형식으로 입력해주세요.', type: 'error' };
            }
            return { message: '', type: 'success' };
        }

        function validatePassword(options = {}) {
            const { showEmpty = false } = options;
            const value = passwordInput.value;
            if (!value) {
                return showEmpty ? { message: '비밀번호를 입력해주세요.', type: 'error' } : { message: '', type: '' };
            }
            if (value.length < 8 || value.length > 16) {
                return { message: '비밀번호는 8자 이상 16자 이하로 입력해주세요.', type: 'error' };
            }
            const passwordPattern = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,16}$/;
            if (!passwordPattern.test(value)) {
                return { message: '비밀번호는 영문, 숫자, 특수문자를 각각 1개 이상 포함해야 합니다.', type: 'error' };
            }
            return { message: '사용할 수 있는 비밀번호입니다.', type: 'success' };
        }

        function validateConfirmPassword(options = {}) {
            const { showEmpty = false } = options;
            const value = confirmPasswordInput.value;
            if (!value) {
                return showEmpty ? { message: '비밀번호를 다시 입력해주세요.', type: 'error' } : { message: '', type: '' };
            }
            if (!passwordInput.value) {
                return { message: '비밀번호를 먼저 입력해주세요.', type: 'error' };
            }
            if (value !== passwordInput.value) {
                return { message: '비밀번호가 일치하지 않습니다.', type: 'error' };
            }
            return { message: '비밀번호가 일치합니다.', type: 'success' };
        }

        function validateNumber(options = {}) {
            const { showEmpty = false } = options;
            const value = hiddenNumber.value.trim();
            if (!value) {
                return showEmpty ? { message: '휴대폰 번호를 입력해주세요.', type: 'error' } : { message: '', type: '' };
            }
            const phonePattern = /^(01[016789])(\d{3,4})(\d{4})$/;
            if (!phonePattern.test(value)) {
                return { message: '휴대폰 번호를 정확히 입력해주세요.', type: 'error' };
            }
            return { message: '사용할 수 있는 휴대폰 번호입니다.', type: 'success' };
        }

        function validateAddressGroup(options = {}) {
            const { showEmpty = false } = options;
            if (!postcodeInput.value.trim()) {
                return showEmpty ? { message: '우편번호를 입력해주세요.', type: 'error' } : { message: '', type: '' };
            }
            if (!/^\d{5}$/.test(postcodeInput.value.trim())) {
                return { message: '우편번호 5자리를 확인해주세요.', type: 'error' };
            }
            if (!addressInput.value.trim()) {
                return { message: '주소 검색을 통해 기본 주소를 입력해주세요.', type: 'error' };
            }
            return { message: '사용할 수 있는 주소 정보입니다.', type: 'success' };
        }

        function renderValidation(fieldName, result) {
            const message = result ? result.message : '';
            const type = result ? result.type : '';
            if (fieldName === 'number') {
                setPhoneInvalid(type === 'error');
            } else if (fieldName === 'addressGroup') {
                setInputInvalid(postcodeInput, type === 'error');
                setInputInvalid(addressInput, type === 'error');
            } else {
                const input = {
                    name: nameInput,
                    email: emailInput,
                    password: passwordInput,
                    confirmPassword: confirmPasswordInput
                }[fieldName];
                setInputInvalid(input, type === 'error');
            }

            setFieldFeedback(fieldName, message, type);
            return type !== 'error';
        }

        function validateField(fieldName, options = {}) {
            switch (fieldName) {
                case 'name':
                    return renderValidation(fieldName, validateName(options));
                case 'email':
                    return renderValidation(fieldName, validateEmailFormat(options));
                case 'password':
                    return renderValidation(fieldName, validatePassword(options));
                case 'confirmPassword':
                    return renderValidation(fieldName, validateConfirmPassword(options));
                case 'number':
                    return renderValidation(fieldName, validateNumber(options));
                case 'addressGroup':
                    return renderValidation(fieldName, validateAddressGroup(options));
                default:
                    return true;
            }
        }

        function applySavedNumber(value) {
            const digits = digitsOnly(value);

            if (digits.length >= 3) {
                prefixInput.value = digits.slice(0, 3);
            }
            if (digits.length >= 7) {
                middleInput.value = digits.slice(3, 7);
                lastInput.value = digits.slice(7, 11);
            } else if (digits.length > 3) {
                middleInput.value = digits.slice(3);
            }

            syncHiddenNumber();
        }

        function bindNumericInput(currentInput, nextInput) {
            currentInput.addEventListener('input', function () {
                currentInput.value = digitsOnly(currentInput.value).slice(0, 4);
                syncHiddenNumber();
                validateField('number');

                if (currentInput.value.length === 4 && nextInput) {
                    nextInput.focus();
                }
            });
        }

        prefixInput.addEventListener('change', function () {
            syncHiddenNumber();
            validateField('number');
        });
        bindNumericInput(middleInput, lastInput);
        bindNumericInput(lastInput, null);

        [
            { input: nameInput, fieldName: 'name' },
            { input: emailInput, fieldName: 'email' },
            { input: passwordInput, fieldName: 'password' },
            { input: confirmPasswordInput, fieldName: 'confirmPassword' }
        ].forEach(function (item) {
            item.input.addEventListener('input', function () {
                if (item.fieldName === 'password') {
                    updatePasswordChecklist();
                    validateField('confirmPassword');
                }
                validateField(item.fieldName);
            });
            item.input.addEventListener('blur', function () {
                validateField(item.fieldName);
            });
        });

        async function checkEmailDuplicate(options = {}) {
            const formatResult = validateEmailFormat(options);
            if (formatResult.type === 'error') {
                renderValidation('email', formatResult);
                return false;
            }
            if (!emailInput.value.trim()) {
                renderValidation('email', formatResult);
                return false;
            }

            const requestToken = ++emailCheckToken;
            setFieldFeedback('email', '이메일을 확인하는 중입니다.', 'success');

            try {
                const response = await fetch('/members/check-email?email=' + encodeURIComponent(emailInput.value.trim()), {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('EMAIL_CHECK_FAILED');
                }

                const result = await response.json();
                if (requestToken !== emailCheckToken) {
                    return false;
                }

                if (result.duplicate) {
                    renderValidation('email', { message: '중복된 이메일입니다.', type: 'error' });
                    return false;
                }

                renderValidation('email', { message: '사용 가능한 이메일입니다.', type: 'success' });
                return true;
            } catch (_) {
                if (requestToken === emailCheckToken) {
                    renderValidation('email', { message: '이메일 확인 중 오류가 발생했습니다.', type: 'error' });
                }
                return false;
            }
        }

        emailInput.addEventListener('blur', function () {
            checkEmailDuplicate();
        });

        [prefixInput, middleInput, lastInput].forEach(function (inputEl) {
            inputEl.addEventListener('blur', function () {
                validateField('number');
            });
        });

        applySavedNumber(hiddenNumber.value);
        updatePasswordChecklist();

        const postcodeInput = document.getElementById('postcode');
        const addressInput = document.getElementById('address');
        const detailAddressInput = document.getElementById('detailAddress');
        const addressSearchButton = document.getElementById('addressSearchButton');

        if (postcodeInput && addressInput && detailAddressInput && addressSearchButton && window.kakao && window.kakao.Postcode) {
            addressSearchButton.addEventListener('click', function () {
                new kakao.Postcode({
                    oncomplete: function (data) {
                        let address = '';
                        let extraAddress = '';

                        if (data.userSelectedType === 'R') {
                            address = data.roadAddress;

                            if (data.bname && /[동로가]$/g.test(data.bname)) {
                                extraAddress += data.bname;
                            }

                            if (data.buildingName && data.apartment === 'Y') {
                                extraAddress += extraAddress ? ', ' + data.buildingName : data.buildingName;
                            }

                            if (extraAddress) {
                                address += ' (' + extraAddress + ')';
                            }
                        } else {
                            address = data.jibunAddress;
                        }

                        postcodeInput.value = data.zonecode;
                        addressInput.value = address;
                        validateField('addressGroup');
                        detailAddressInput.focus();
                    }
                }).open();
            });
        }

        detailAddressInput.addEventListener('blur', function () {
            validateField('addressGroup');
        });

        form.addEventListener('submit', function (event) {
            syncHiddenNumber();
            event.preventDefault();

            const baseValid = [
                validateField('name', { showEmpty: true }),
                validateField('password', { showEmpty: true }),
                validateField('confirmPassword', { showEmpty: true }),
                validateField('number', { showEmpty: true }),
                validateField('addressGroup', { showEmpty: true })
            ].every(Boolean);

            if (!baseValid) {
                return;
            }

            checkEmailDuplicate({ showEmpty: true }).then(function (emailValid) {
                if (emailValid) {
                    form.submit();
                }
            });
        });
    });
</script>

</body>
</html>
