<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/member-auth.css}">
    <title>로그인</title>
</head>
<body>
<div th:replace="~{layouts/header :: header}"></div>

<main class="auth-wrap">
    <section class="auth-card">
        <span class="auth-label">Welcome Back</span>
        <h2>로그인</h2>
        <p class="auth-description">가입한 이메일과 비밀번호를 입력해 계정에 접속하세요.</p>

        <div class="auth-alert error" th:if="${loginErrorMessage}">
            <p th:text="${loginErrorMessage}"></p>
        </div>

        <div class="auth-alert success" th:if="${signupSuccessMessage}">
            <p th:text="${signupSuccessMessage}"></p>
        </div>

        <form class="auth-form" th:action="@{/members/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="redirectUrl" th:value="${redirectUrl}">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="email" placeholder="이메일을 입력하세요">
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력하세요">
            </div>

            <button class="auth-submit" type="submit">로그인</button>
        </form>

        <div class="auth-divider" th:if="${googleLoginEnabled or kakaoLoginEnabled}">
            <span>또는</span>
        </div>

        <a class="social-login social-login--google"
           th:if="${googleLoginEnabled}"
           th:href="${redirectUrl != null and !#strings.isEmpty(redirectUrl)} ? @{/oauth2/authorization/google(redirectUrl=${redirectUrl})} : @{/oauth2/authorization/google}">
            <span class="social-login__mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="social-login__icon">
                    <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-.9 2.4-2 3.2l3.2 2.5c1.9-1.7 3-4.3 3-7.3 0-.7-.1-1.4-.2-2H12z"/>
                    <path fill="#4285F4" d="M12 22c2.7 0 5-.9 6.7-2.4l-3.2-2.5c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.7-5.6-4.1H3.2v2.6C4.9 19.8 8.2 22 12 22z"/>
                    <path fill="#FBBC05" d="M6.4 13.9c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V7.5H3.2C2.4 9 2 10.5 2 12s.4 3 1.2 4.5l3.2-2.6z"/>
                    <path fill="#34A853" d="M12 6c1.5 0 2.8.5 3.8 1.4l2.8-2.8C17 3 14.7 2 12 2 8.2 2 4.9 4.2 3.2 7.5l3.2 2.6C7.2 7.7 9.4 6 12 6z"/>
                </svg>
            </span>
            <span class="social-login__text">구글 계정으로 로그인</span>
        </a>

        <a class="social-login social-login--kakao"
           th:if="${kakaoLoginEnabled}"
           th:href="${redirectUrl != null and !#strings.isEmpty(redirectUrl)} ? @{/oauth2/authorization/kakao(redirectUrl=${redirectUrl})} : @{/oauth2/authorization/kakao}">
            <span class="social-login__mark social-login__mark--kakao" aria-hidden="true">
                <span class="social-login__icon social-login__icon--kakao">K</span>
            </span>
            <span class="social-login__text">카카오 계정으로 로그인</span>
        </a>

        <div class="auth-links">
            아직 계정이 없다면 <a th:href="@{/members/new}">회원가입</a>
        </div>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>
</body>
</html>
