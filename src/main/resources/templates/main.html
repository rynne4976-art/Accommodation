<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accommodation</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

</head>

<body>

<div th:replace="~{layouts/header :: header}"></div>

<div th:if="${logoutMessage}" style="margin: 16px auto; width: fit-content; color: #1f6f43; font-weight: 600;">
    <p th:text="${logoutMessage}"></p>
</div>


<!-- 메인 배너 -->
<section class="hero">

    <div class="hero-overlay">

        <h1>원하는 숙소를 가장 빠르게 찾아보세요</h1>

        <div class="search-box">

            <input type="text" placeholder="도시, 지역, 숙소명을 입력하세요">

            <input type="date">

            <input type="date">

            <button>검색</button>

        </div>

    </div>

</section>



<!-- 인기 숙소 -->
<section class="accom-section">

    <h2>숙소 목록</h2>

    <div class="accom-list">

        <div class="accom-card"
             th:each="accom : ${accomList}"
             th:if="${accomList != null}">

            <img th:src="${accom.imageUrl}" alt="숙소 이미지">

            <div class="accom-info">

                <h3 th:text="${accom.name}">숙소명</h3>

                <div class="rating">

                    ⭐ <span th:text="${accom.star}">4.5</span>

                    <span class="review">(후기)</span>

                </div>

                <p class="desc"
                   th:text="${accom.description}">
                    숙소 설명
                </p>

                <div class="bottom">

            <span class="price"
                  th:text="${accom.price} + '원 / 박'">
                  120000원 / 박
            </span>

                    <button class="reserve">예약하기</button>

                </div>

            </div>

        </div>

    </div>

</section>



<!-- 최근 본 숙소 -->
<section class="recent-section">

    <h2>최근 본 숙소</h2>

    <div class="recent-container">

        <div class="recent-list">

            <div class="recent-item">
                <img src="/images/sample1.png">
                <span>130,000원</span>
            </div>

            <div class="recent-item">
                <img src="/images/sample2.png">
                <span>110,000원</span>
            </div>

            <div class="recent-item">
                <img src="/images/sample3.png">
                <span>95,000원</span>
            </div>

        </div>


        <div class="recent-banner">

            <img src="/images/beach.png">

            <div class="banner-text">

                <h2>Haeundae Beach</h2>

                <p>사계절 내내 아름다운 부산 대표 해변</p>

            </div>

        </div>

    </div>

</section>



<!-- 숙소 주변 명소 -->
<section class="place-section">

    <h2>숙소 주변 인기 명소</h2>

    <div class="place-list">

        <div class="place-card">
            <img src="/images/nseoul.png">
            <span>N Seoul Tower</span>
        </div>

        <div class="place-card">
            <img src="/images/haeundae.png">
            <span>Haeundae Beach</span>
        </div>

        <div class="place-card">
            <img src="/images/seongsan.png">
            <span>Seongsan Ilchulbong</span>
        </div>

        <div class="place-card">
            <img src="/images/bulguksa.png">
            <span>Bulguksa Temple</span>
        </div>

    </div>

</section>



<div th:replace="~{layouts/footer :: footer}"></div>

</body>
</html>
