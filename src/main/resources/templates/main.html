<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accommodation</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>
<div th:replace="layouts/header :: header"></div>

<section class="hero">
    <div class="hero-overlay">
        <h1 class="hero-copy">원하는 숙소를 가장 빠르게 찾아보세요</h1>

        <div class="booking-shell">
            <div class="booking-tabs">
                <button class="booking-tab" type="button" data-booking-tab="domestic">국내 숙소</button>
                <button class="booking-tab active" type="button" data-booking-tab="global">해외 숙소</button>
            </div>

            <div class="booking-bar">
                <label class="booking-field">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10 4a6 6 0 1 0 3.874 10.582l4.272 4.272 1.414-1.414-4.272-4.272A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/>
                    </svg>
                    <input class="booking-input" type="text" placeholder="여행지나 숙소를 검색해보세요.">
                </label>

                <button class="booking-action is-placeholder" id="dateTrigger" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 2h2v2h6V2h2v2h3v18H4V4h3V2Zm11 8H6v10h12V10Zm0-4H6v2h12V6Z"/>
                    </svg>
                    <span id="dateRangeLabel">체크인 날짜 - 체크아웃 날짜</span>
                </button>

                <button class="booking-action is-placeholder" id="guestTrigger" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 2c-4.418 0-8 2.239-8 5v1h16v-1c0-2.761-3.582-5-8-5Z"/>
                    </svg>
                    <span id="guestDisplay">총 인원 0, 객실 1</span>
                </button>

                <button class="booking-search" type="button">검색</button>
            </div>

            <div class="popup-panel calendar-popup" id="calendarPopup">
                <div class="calendar-header">
                    <button class="calendar-nav" id="prevMonthBtn" type="button">&lsaquo;</button>
                    <div></div>
                    <button class="calendar-nav" id="nextMonthBtn" type="button">&rsaquo;</button>
                </div>

                <div class="calendar-months">
                    <div class="calendar-month">
                        <h3 class="calendar-month-title" id="monthTitleLeft"></h3>
                        <div class="calendar-weekdays">
                            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                        </div>
                        <div class="calendar-days" id="monthDaysLeft"></div>
                    </div>

                    <div class="calendar-month">
                        <h3 class="calendar-month-title" id="monthTitleRight"></h3>
                        <div class="calendar-weekdays">
                            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                        </div>
                        <div class="calendar-days" id="monthDaysRight"></div>
                    </div>
                </div>

                <div class="calendar-footer">
                    <button class="calendar-reset" id="calendarResetBtn" type="button">일정 초기화</button>
                    <span class="calendar-summary" id="calendarSummary">체크인 날짜 - 체크아웃 날짜</span>
                </div>
            </div>

            <div class="popup-panel guest-popup" id="guestPopup">
                <div class="guest-option">
                    <div class="guest-copy">
                        <strong>성인</strong>
                        <span>총 성인 수</span>
                    </div>
                    <div class="guest-counter">
                        <button id="adultMinusBtn" type="button">-</button>
                        <span id="adultCount">0</span>
                        <button id="adultPlusBtn" type="button">+</button>
                    </div>
                </div>

                <div class="guest-option">
                    <div class="guest-copy">
                        <strong>아동</strong>
                        <span>총 아동 수 (만 0세 - 17세)</span>
                    </div>
                    <div class="guest-counter">
                        <button id="childMinusBtn" type="button">-</button>
                        <span id="childCount">0</span>
                        <button id="childPlusBtn" type="button">+</button>
                    </div>
                </div>

                <div class="guest-option">
                    <div class="guest-copy">
                        <strong>객실</strong>
                        <span>총 인원이 이용할 객실 수</span>
                    </div>
                    <div class="guest-counter">
                        <button id="roomMinusBtn" type="button">-</button>
                        <span id="roomCount">1</span>
                        <button id="roomPlusBtn" type="button">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="popular-area">
    <h2>국내 인기 여행지</h2>
    <div class="area-list">
        <div class="area-card">
            <img th:src="@{/images/main/seoul.png}" alt="서울">
            <span>서울</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/busan.png}" alt="부산">
            <span>부산</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/gangneung.png}" alt="강릉">
            <span>강릉</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/jeju.png}" alt="제주">
            <span>제주</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/gyeongju.png}" alt="경주">
            <span>경주</span>
        </div>
    </div>
</section>

<section class="popular-area">
    <h2>해외 인기 여행지</h2>
    <div class="area-list area-list-five">
        <div class="area-card">
            <img th:src="@{/images/main/bangkok.png}" alt="방콕">
            <span>방콕</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/tokyo.png}" alt="도쿄">
            <span>도쿄</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/newyork.png}" alt="뉴욕">
            <span>뉴욕</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/roma.png}" alt="로마">
            <span>로마</span>
        </div>
        <div class="area-card">
            <img th:src="@{/images/main/paris.png}" alt="파리">
            <span>파리</span>
        </div>
    </div>
</section>

<section class="accommodation accom-section">
    <h2>숙소 목록</h2>

    <div class="accommodation-cards accom-list" th:if="${accomList != null and !#lists.isEmpty(accomList)}">
        <div class="card accom-card" th:each="accom : ${accomList}">
            <img th:src="${accom.imgUrl}" alt="숙소 이미지">
            <div class="card-body accom-info">
                <h3 th:text="${accom.accomName}">숙소명</h3>
                <div class="rating">
                    ★ <span th:text="${accom.avgRating}">4.5</span>
                    <span class="review" th:text="'(후기 ' + ${accom.reviewCount} + ')'">(후기 0)</span>
                </div>
                <p class="desc" th:text="${accom.accomDetail}">숙소 설명</p>
                <p class="desc" th:text="${accom.location}">숙소 위치</p>
                <div class="card-bottom bottom">
                    <span class="price" th:text="${accom.pricePerNight} + '원 / 박'">120000원 / 박</span>
                    <button class="reserve-btn reserve" type="button">예약하기</button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${accomList == null or #lists.isEmpty(accomList)}">
        <p>표시할 숙소가 없습니다.</p>
    </div>
</section>

<div th:replace="layouts/footer :: footer"></div>

<script th:src="@{/js/main.js}"></script>
<script>
    const bookingTabs = document.querySelectorAll("[data-booking-tab]");
    const dateTrigger = document.getElementById("dateTrigger");
    const guestTrigger = document.getElementById("guestTrigger");
    const dateRangeLabel = document.getElementById("dateRangeLabel");
    const guestDisplay = document.getElementById("guestDisplay");
    const calendarPopup = document.getElementById("calendarPopup");
    const guestPopup = document.getElementById("guestPopup");
    const calendarSummary = document.getElementById("calendarSummary");
    const monthTitleLeft = document.getElementById("monthTitleLeft");
    const monthTitleRight = document.getElementById("monthTitleRight");
    const monthDaysLeft = document.getElementById("monthDaysLeft");
    const monthDaysRight = document.getElementById("monthDaysRight");
    const weekdayNames = ["일", "월", "화", "수", "목", "금", "토"];

    const today = new Date();
    const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    let adultCount = 0;
    let childCount = 0;
    let roomCount = 1;
    let rangeStart = null;
    let rangeEnd = null;
    let currentMonth = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);

    const counters = [
        ["adultMinusBtn", "adultPlusBtn", "adultCount", () => adultCount, (v) => { adultCount = v; }, 0],
        ["childMinusBtn", "childPlusBtn", "childCount", () => childCount, (v) => { childCount = v; }, 0],
        ["roomMinusBtn", "roomPlusBtn", "roomCount", () => roomCount, (v) => { roomCount = v; }, 1]
    ];

    function addDays(date, days) {
        const next = new Date(date);
        next.setDate(next.getDate() + days);
        return next;
    }

    function sameDate(a, b) {
        return a && b
            && a.getFullYear() === b.getFullYear()
            && a.getMonth() === b.getMonth()
            && a.getDate() === b.getDate();
    }

    function formatDate(date) {
        return `${date.getMonth() + 1}.${String(date.getDate()).padStart(2, "0")} ${weekdayNames[date.getDay()]}`;
    }

    function renderDateLabel() {
        let text = "체크인 날짜 - 체크아웃 날짜";

        if (rangeStart && !rangeEnd) {
            text = `${formatDate(rangeStart)} - 체크아웃 날짜`;
        } else if (rangeStart && rangeEnd) {
            const nights = Math.round((rangeEnd - rangeStart) / 86400000);
            text = `${formatDate(rangeStart)} - ${formatDate(rangeEnd)} (${nights}박)`;
        }

        dateRangeLabel.textContent = text;
        calendarSummary.textContent = text;
        dateTrigger.classList.toggle("is-placeholder", !rangeStart);
    }

    function renderGuestLabel() {
        const totalGuests = adultCount + childCount;
        document.getElementById("adultCount").textContent = adultCount;
        document.getElementById("childCount").textContent = childCount;
        document.getElementById("roomCount").textContent = roomCount;
        guestDisplay.textContent = `총 인원 ${totalGuests}, 객실 ${roomCount}`;
        guestTrigger.classList.toggle("is-placeholder", totalGuests === 0 && roomCount === 1);
    }

    function buildMonth(container, titleNode, baseMonth) {
        container.innerHTML = "";
        titleNode.textContent = `${baseMonth.getFullYear()}년 ${baseMonth.getMonth() + 1}월`;

        const firstDay = new Date(baseMonth.getFullYear(), baseMonth.getMonth(), 1);
        const lastDate = new Date(baseMonth.getFullYear(), baseMonth.getMonth() + 1, 0).getDate();

        for (let i = 0; i < firstDay.getDay(); i += 1) {
            const blank = document.createElement("span");
            blank.className = "calendar-day muted";
            container.appendChild(blank);
        }

        for (let day = 1; day <= lastDate; day += 1) {
            const button = document.createElement("button");
            const value = new Date(baseMonth.getFullYear(), baseMonth.getMonth(), day);
            const dayOfWeek = value.getDay();

            button.type = "button";
            button.className = "calendar-day";
            button.textContent = String(day);

            if (dayOfWeek === 0) button.classList.add("sunday");
            if (dayOfWeek === 6) button.classList.add("saturday");
            if (value < todayDate) button.classList.add("disabled");
            if (rangeStart && rangeEnd && value > rangeStart && value < rangeEnd) button.classList.add("in-range");
            if (sameDate(value, rangeStart) || sameDate(value, rangeEnd)) button.classList.add("selected");

            if (value >= todayDate) {
                button.addEventListener("click", () => selectDate(value));
            } else {
                button.disabled = true;
            }

            container.appendChild(button);
        }
    }

    function renderCalendars() {
        const rightMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
        buildMonth(monthDaysLeft, monthTitleLeft, currentMonth);
        buildMonth(monthDaysRight, monthTitleRight, rightMonth);
    }

    function selectDate(value) {
        if (!rangeStart || rangeEnd) {
            rangeStart = value;
            rangeEnd = null;
        } else if (value < rangeStart) {
            rangeStart = value;
        } else if (sameDate(value, rangeStart)) {
            rangeEnd = addDays(value, 1);
        } else {
            rangeEnd = value;
            calendarPopup.classList.remove("open");
            dateTrigger.classList.remove("active");
        }

        renderDateLabel();
        renderCalendars();
    }

    function closePopups() {
        calendarPopup.classList.remove("open");
        guestPopup.classList.remove("open");
        dateTrigger.classList.remove("active");
        guestTrigger.classList.remove("active");
    }

    bookingTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
            bookingTabs.forEach((button) => button.classList.remove("active"));
            tab.classList.add("active");
        });
    });

    function togglePopup(trigger, popup) {
        const isOpen = popup.classList.contains("open");
        closePopups();
        if (!isOpen) {
            popup.classList.add("open");
            trigger.classList.add("active");
        }
    }

    dateTrigger.addEventListener("click", () => togglePopup(dateTrigger, calendarPopup));
    guestTrigger.addEventListener("click", () => togglePopup(guestTrigger, guestPopup));

    document.getElementById("prevMonthBtn").addEventListener("click", () => {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
        renderCalendars();
    });

    document.getElementById("nextMonthBtn").addEventListener("click", () => {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
        renderCalendars();
    });

    document.getElementById("calendarResetBtn").addEventListener("click", () => {
        rangeStart = null;
        rangeEnd = null;
        currentMonth = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
        renderDateLabel();
        renderCalendars();
    });

    counters.forEach(([minusId, plusId, , getter, setter, min]) => {
        document.getElementById(minusId).addEventListener("click", () => {
            setter(Math.max(min, getter() - 1));
            renderGuestLabel();
        });

        document.getElementById(plusId).addEventListener("click", () => {
            setter(getter() + 1);
            renderGuestLabel();
        });
    });

    document.addEventListener("click", (event) => {
        if (!event.target.closest(".booking-shell")) {
            closePopups();
        }
    });

    rangeStart = addDays(todayDate, 4);
    rangeEnd = addDays(todayDate, 5);
    renderDateLabel();
    renderGuestLabel();
    renderCalendars();
</script>
</body>
</html>
