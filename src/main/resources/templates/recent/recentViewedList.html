<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>최근 본 상품</title>
</head>

<div layout:fragment="content">
    <section class="accommodation accom-section recent-viewed-page">
        <div class="accom-section__head">
            <div>
                <p class="accom-section__eyebrow">Recently Viewed</p>
                <h2>최근 본 상품</h2>
                <p class="accom-section__sub">최근 확인한 숙소를 한 곳에서 다시 볼 수 있습니다.</p>
            </div>
        </div>

        <div class="recent-viewed-grid" th:if="${recentViewedList != null and !#lists.isEmpty(recentViewedList)}">
            <th:block th:each="accom : ${recentViewedList}">
                <th:block th:replace="~{fragments/accom-card :: content(${accom}, ${accom.id}, false)}"></th:block>
            </th:block>
        </div>

        <div class="recent-viewed-empty" th:if="${recentViewedList == null or #lists.isEmpty(recentViewedList)}">
            <p>최근 본 상품이 없습니다.</p>
            <a th:href="@{/main}" class="reserve-btn recent-viewed-empty__action">숙소 보러가기</a>
        </div>
    </section>

    <script th:src="@{/js/wish.js}"></script>
</div>
</html>
