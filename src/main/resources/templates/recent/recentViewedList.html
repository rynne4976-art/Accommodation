<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>최근 본 상품</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<div layout:fragment="content">
    <section class="accommodation accom-section recent-viewed-page">
        <div class="accom-section__head">
            <div>
                <p class="accom-section__eyebrow">Recently Viewed</p>
                <h2>최근 본 상품</h2>
                <p class="accom-section__sub">최근 확인한 숙소를 한 곳에서 다시 볼 수 있습니다.</p>
            </div>
        </div>

        <div class="recent-viewed-grid" th:if="${recentViewedList != null and !#lists.isEmpty(recentViewedList)}">
            <article class="card accom-card" th:each="accom : ${recentViewedList}">
                <div class="accom-card__visual">
                    <button class="accom-card__wish"
                            type="button"
                            aria-label="찜"
                            aria-pressed="false"
                            th:attr="data-accom-id=${accom.id}"
                            data-wish-button>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 20.5 4.8 13.8a4.9 4.9 0 0 1 6.9-6.9L12 7.2l.3-.3a4.9 4.9 0 0 1 6.9 6.9Z"/>
                        </svg>
                    </button>
                    <img class="accom-card__image"
                         th:if="${accom.imgUrl != null and !#strings.isEmpty(accom.imgUrl)}"
                         th:src="${accom.imgUrl}"
                         th:alt="${accom.accomName}">
                    <div class="accom-card__image-placeholder"
                         th:unless="${accom.imgUrl != null and !#strings.isEmpty(accom.imgUrl)}">
                        <span th:text="${accom.grade}">GRADE</span>
                    </div>
                </div>

                <div class="card-body accom-info">
                    <div class="accom-card__badge-row"
                         th:with="gradeNum=${accom.grade == T(com.Accommodation.constant.AccomGrade).ONE ? 1 :
                                            accom.grade == T(com.Accommodation.constant.AccomGrade).TWO ? 2 :
                                            accom.grade == T(com.Accommodation.constant.AccomGrade).THREE ? 3 :
                                            accom.grade == T(com.Accommodation.constant.AccomGrade).FOUR ? 4 :
                                            accom.grade == T(com.Accommodation.constant.AccomGrade).FIVE ? 5 : 0}">
                        <span class="accom-card__kind"
                              th:text="${accom.accomType == T(com.Accommodation.constant.AccomType).HOTEL ? '호텔' :
                                         accom.accomType == T(com.Accommodation.constant.AccomType).MOTEL ? '모텔' :
                                         accom.accomType == T(com.Accommodation.constant.AccomType).PENSION ? '펜션' :
                                         accom.accomType == T(com.Accommodation.constant.AccomType).RESORT ? '리조트' :
                                         accom.accomType == T(com.Accommodation.constant.AccomType).GUESTHOUSE ? '게스트하우스' : '숙소'}">숙소</span>
                        <span class="accom-card__grade-stars" aria-label="숙소 등급">
                            <span class="star filled"
                                  th:each="i : ${#numbers.sequence(1, gradeNum)}">&#9733;</span>
                        </span>
                    </div>
                    <h3 class="accom-card__title" th:text="${accom.accomName}">숙소명</h3>

                    <div class="accom-card__rating">
                        <span class="accom-card__score"
                              th:text="${accom.avgRating != null ? #numbers.formatDecimal(accom.avgRating, 1, 1) : '0.0'}">0.0</span>
                        <div class="accom-card__rating-copy">
                            <span th:text="${accom.reviewCount != null ? #numbers.formatInteger(accom.reviewCount, 1, 'COMMA') + '개 후기' : '후기 0개'}">후기 0개</span>
                        </div>
                    </div>

                    <div class="accom-card__meta">
                        <div class="accom-card__location">
                            <span th:text="${accom.location}">위치</span>
                        </div>
                        <div class="accom-card__desc">
                            <span th:text="${accom.accomDetail}">상세설명</span>
                        </div>
                    </div>

                    <div class="card-bottom accom-card__bottom">
                        <div class="accom-card__price-wrap">
                            <span class="accom-card__price-label">1박 기준</span>
                            <strong class="price"
                                    th:text="${#numbers.formatInteger(accom.pricePerNight, 3, 'COMMA')} + '원'">0원</strong>
                        </div>
                        <a class="reserve-btn" th:href="@{/accom/{accomId}(accomId=${accom.id})}">상세설명</a>
                    </div>
                </div>
            </article>
        </div>

        <div class="recent-viewed-empty" th:if="${recentViewedList == null or #lists.isEmpty(recentViewedList)}">
            <p>최근 본 상품이 없습니다.</p>
            <a th:href="@{/main}" class="reserve-btn recent-viewed-empty__action">숙소 보러가기</a>
        </div>
    </section>

    <script th:src="@{/js/wish.js}"></script>
</div>
</html>
