<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content(item, accomId, wishActive)">
    <article class="card accom-card">
        <div class="accom-card__visual">
            <button class="accom-card__wish"
                    type="button"
                    aria-label="찜"
                    th:classappend="${wishActive} ? ' is-active' : ''"
                    th:attr="data-accom-id=${accomId},aria-pressed=${wishActive}"
                    data-wish-button>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 20.5 4.8 13.8a4.9 4.9 0 0 1 6.9-6.9L12 7.2l.3-.3a4.9 4.9 0 0 1 6.9 6.9Z"/>
                </svg>
            </button>

            <a class="accom-card__image-link"
               th:href="@{/accom/{accomId}(accomId=${accomId})}"
               th:aria-label="${item.accomName + ' 상세보기'}">
                <img class="accom-card__image"
                     th:if="${item.imgUrl != null and !#strings.isEmpty(item.imgUrl)}"
                     th:src="${item.imgUrl}"
                     th:alt="${item.accomName}">
                <div class="accom-card__image-placeholder"
                     th:unless="${item.imgUrl != null and !#strings.isEmpty(item.imgUrl)}">
                    <span th:text="${item.grade != null ? item.grade.num : 'GRADE'}">GRADE</span>
                </div>
            </a>
        </div>

        <div class="card-body accom-info">
            <div class="accom-card__badge-row"
                 th:with="gradeNum=${item.grade != null ? item.grade.num : 0}">
                <span class="accom-card__kind"
                      th:text="${item.accomType != null ? item.accomType.label : '숙소'}">숙소</span>
                <span class="accom-card__grade-stars" aria-label="숙소 등급">
                    <span class="star filled"
                          th:each="i : ${#numbers.sequence(1, gradeNum)}">&#9733;</span>
                </span>
            </div>

            <h3 class="accom-card__title" th:text="${item.accomName}">숙소명</h3>

            <div class="accom-card__rating">
                <span class="accom-card__score"
                      th:text="${item.avgRating != null ? #numbers.formatDecimal(item.avgRating, 1, 1) : '0.0'}">0.0</span>
                <div class="accom-card__rating-copy">
                    <a class="accom-card__review-link"
                       th:href="@{/reviews/accom/{id}(id=${accomId})}"
                       th:text="${item.reviewCount != null ? #numbers.formatInteger(item.reviewCount, 1, 'COMMA') + '개 후기' : '후기 0개'}">후기 0개</a>
                </div>
            </div>

            <div class="accom-card__meta">
                <div class="accom-card__location">
                    <span th:text="${item.location}">위치</span>
                </div>
                <div class="accom-card__desc">
                    <span th:text="${item.accomDetail}">상세설명</span>
                </div>
            </div>

            <div class="card-bottom accom-card__bottom">
                <div class="accom-card__price-wrap">
                    <span class="accom-card__price-label">1박 기준</span>
                    <strong class="price"
                            th:text="${#numbers.formatInteger(item.pricePerNight, 3, 'COMMA')} + '원'">0원</strong>
                </div>

                <a class="reserve-btn accom-card__detail-link"
                   th:href="@{/accom/{accomId}(accomId=${accomId})}">
                    상세보기
                </a>
            </div>
        </div>
    </article>
</th:block>
</body>
</html>
