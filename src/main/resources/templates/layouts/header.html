<header th:fragment="header" class="header" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div class="header-inner">

        <div class="logo">
            <a th:href="${#authorization.expression('hasRole(''ADMIN'')')} ? @{/admin} : @{/main}">Ac.com</a>
        </div>

        <div class="search-bar" th:if="${compactHeader == null or !compactHeader}">
            <input type="text" placeholder="검색어를 입력하세요">
        </div>

        <div class="menu-right">
            <div sec:authorize="isAnonymous()" class="menu-group">
                <a th:href="@{/members/login}">로그인</a>
                <a th:href="@{/members/new}">회원가입</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-status-group">
                <span class="user-greeting">환영합니다, <strong sec:authentication="name">user@example.com</strong>님</span>
                <form th:action="@{/members/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="logout-button header-action-link">
                        로그아웃
                    </button>
                </form>
            </div>

            <div sec:authorize="isAuthenticated() and !hasRole('ADMIN')" class="icon-menu">
                <a th:href="@{/members/mypage}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="8" r="3.5"></circle>
                        <path d="M5 19c0-3.5 3.2-6 7-6s7 2.5 7 6"></path>
                    </svg>
                    <span>마이</span>
                </a>
                <a th:href="@{/wish}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 20s-6.5-4.1-8.5-8C2 9.1 3.8 6 7.3 6c2 0 3.1 1.1 4.7 3 1.6-1.9 2.7-3 4.7-3C20.2 6 22 9.1 20.5 12c-2 3.9-8.5 8-8.5 8z"></path>
                    </svg>
                    <span>찜</span>
                </a>
                <a th:href="@{/cart}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="9" cy="19" r="1.5"></circle>
                        <circle cx="18" cy="19" r="1.5"></circle>
                        <path d="M4 5h2l2.2 9h9.6l2.2-7H7.2"></path>
                    </svg>
                    <span>장바구니</span>
                </a>
                <a href="#" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="8"></circle>
                        <path d="M12 8v4l3 2"></path>
                    </svg>
                    <span>최근 본 상품</span>
                </a>
            </div>
        </div>

    </div>

    <div class="header-bottom" th:if="${compactHeader == null or !compactHeader}">
        <div class="header-bottom-inner">
            <nav class="category-menu">
                <th:block sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/members}">회원 관리</a>
                    <a th:href="@{/admin/accoms}">숙소 관리</a>
                    <a th:href="@{/admin/orders}">예약 관리</a>
                </th:block>

                <th:block sec:authorize="!hasRole('ADMIN')">
                    <a href="#">호텔</a>
                    <a href="#">리조트</a>
                    <a href="#">펜션</a>
                    <a href="#">모텔</a>
                    <a href="#">게스트하우스</a>
                    <a href="#">교통/렌트카</a>
                    <a href="#">해외숙소</a>
                </th:block>
            </nav>

            <a sec:authorize="hasRole('ADMIN')" th:href="@{/main}" class="header-action-link header-bottom-action">메인 보기</a>
        </div>
    </div>

</header>
