<header th:fragment="header"
        class="header"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div class="header-inner">

        <div class="logo">
            <a th:href="@{/main}">Ac.com</a>
        </div>

        <form class="search-bar"
              th:if="${(compactHeader == null or !compactHeader) and currentUri != '/main' and currentUri != '/'}"
              th:action="@{/searchList}"
              method="get">
            <input type="text"
                   name="searchQuery"
                   th:value="${param.searchQuery}"
                   placeholder="지역명 또는 숙소명을 검색하세요">
            <button type="submit" class="search-bar__submit" aria-label="검색">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.874 10.582l4.272 4.272 1.414-1.414-4.272-4.272A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/>
                </svg>
            </button>
        </form>

        <div class="menu-right">
            <div sec:authorize="isAnonymous()" class="menu-group">
                <a th:href="${currentUri == '/members/login' or currentUri == '/members/new'} ? @{/members/login} : @{/members/login(redirectUrl=${currentPathWithQuery})}">로그인</a>
                <a th:href="@{/members/new}">회원가입</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-status-group">
                <span class="user-greeting">환영합니다,
                    <strong th:text="${#authentication.principal instanceof T(com.Accommodation.config.AuthenticatedMember) ? #authentication.principal.name : #authentication.name}">사용자</strong>님
                </span>
                <form th:action="@{/members/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="logout-button header-action-link">
                        로그아웃
                    </button>
                </form>
            </div>

            <div sec:authorize="isAuthenticated()" class="icon-menu">
                <div class="notification-center">
                    <button type="button" id="notificationButton" class="notification-button icon-link" aria-expanded="false">
                        <svg class="notification-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15 18H9"></path>
                            <path d="M18 16H6l1.5-2.5V10a4.5 4.5 0 0 1 9 0v3.5L18 16z"></path>
                            <path d="M10.5 19a1.5 1.5 0 0 0 3 0"></path>
                        </svg>
                        <span>알림</span>
                        <span id="notificationBadge" class="notification-button__badge">0</span>
                    </button>
                    <div id="notificationPanel" class="notification-panel" aria-live="polite">
                        <div class="notification-panel__header">
                            <strong>예약 알림</strong>
                        </div>
                        <div id="notificationList" class="notification-panel__list">
                            <p class="notification-panel__empty">알림이 없습니다.</p>
                        </div>
                    </div>
                </div>
                <a th:if="${currentUri != '/members/mypage'}" th:href="@{/members/mypage}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="8" r="3.5"></circle>
                        <path d="M5 19c0-3.5 3.2-6 7-6s7 2.5 7 6"></path>
                    </svg>
                    <span>마이</span>
                </a>
                <span th:if="${currentUri == '/members/mypage'}" class="icon-link icon-link-current" aria-current="page">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="8" r="3.5"></circle>
                        <path d="M5 19c0-3.5 3.2-6 7-6s7 2.5 7 6"></path>
                    </svg>
                    <span>마이</span>
                </span>
                <a th:href="@{/wish}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 20s-6.5-4.1-8.5-8C2 9.1 3.8 6 7.3 6c2 0 3.1 1.1 4.7 3 1.6-1.9 2.7-3 4.7-3C20.2 6 22 9.1 20.5 12c-2 3.9-8.5 8-8.5 8z"></path>
                    </svg>
                    <span>찜</span>
                </a>
                <a th:href="@{/cart}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="9" cy="19" r="1.5"></circle>
                        <circle cx="18" cy="19" r="1.5"></circle>
                        <path d="M4 5h2l2.2 9h9.6l2.2-7H7.2"></path>
                    </svg>
                    <span>장바구니</span>
                </a>
                <a th:href="@{/recent-viewed}" class="icon-link">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="8"></circle>
                        <path d="M12 8v4l3 2"></path>
                    </svg>
                    <span>최근 본 상품</span>
                </a>
            </div>
        </div>

    </div>

    <div class="header-bottom" th:if="${compactHeader == null or !compactHeader}">
        <div class="header-bottom-inner">
            <nav class="category-menu">
                <th:block sec:authorize="hasRole('ADMIN')" th:if="${adminView != null and adminView}">
                    <a th:href="@{/admin/members}">회원 관리</a>
                    <a th:href="@{/admin/accoms}">숙소 관리</a>
                    <a th:href="@{/admin/orders}">예약 관리</a>
                </th:block>

                <th:block th:unless="${adminView != null and adminView}">
                    <a th:href="@{/main/hotels}">호텔</a>
                    <a th:href="@{/main/resorts}">리조트</a>
                    <a th:href="@{/main/pensions}">펜션</a>
                    <a th:href="@{/main/motels}">모텔</a>
                    <a th:href="@{/main/guesthouses}">게스트하우스</a>
                    <a th:href="@{/activities/서울}">즐길거리</a>
                    <a th:href="@{/transport}">교통</a>
                </th:block>
            </nav>

            <a sec:authorize="hasRole('ADMIN')"
               th:if="${adminDashboard == null or !adminDashboard}"
               th:href="@{/admin}"
               class="header-action-link header-bottom-action admin-portal-link">관리자 페이지</a>
            <a sec:authorize="hasRole('ADMIN')"
               th:if="${adminDashboard != null and adminDashboard}"
               th:href="@{/main}"
               class="header-action-link header-bottom-action admin-portal-link">메인 보기</a>
        </div>
    </div>

    <script sec:authorize="isAuthenticated()">
        (function () {
            const button = document.getElementById('notificationButton');
            const badge = document.getElementById('notificationBadge');
            const panel = document.getElementById('notificationPanel');
            const list = document.getElementById('notificationList');
            const logoutForm = document.querySelector('.logout-form');

            if (!button || !badge || !panel || !list || typeof EventSource === 'undefined') {
                return;
            }

            const eventSource = new EventSource('/notifications/stream');
            let notifications = [];

            function closeEventSource() {
                if (eventSource.readyState !== EventSource.CLOSED) {
                    eventSource.close();
                }
            }

            function escapeHtml(value) {
                return String(value)
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#39;');
            }

            function updateBadge() {
                const unreadCount = notifications.filter(function (item) {
                    return !item.read;
                }).length;

                badge.textContent = unreadCount;
                badge.classList.toggle('is-visible', unreadCount > 0);
            }

            function renderList() {
                if (notifications.length === 0) {
                    list.innerHTML = '<p class="notification-panel__empty">알림이 없습니다.</p>';
                    updateBadge();
                    return;
                }

                list.innerHTML = notifications.map(function (item) {
                    return [
                        '<button type="button" class="notification-item' + (item.read ? '' : ' is-unread') + '" data-id="' + item.id + '" data-url="' + escapeHtml(item.targetUrl) + '">',
                        '<span class="notification-item__message">' + escapeHtml(item.message) + '</span>',
                        '<span class="notification-item__time">' + new Date(item.createdAt).toLocaleString() + '</span>',
                        '</button>'
                    ].join('');
                }).join('');

                updateBadge();
            }

            async function loadNotifications() {
                const response = await fetch('/notifications/recent');
                if (!response.ok) {
                    return;
                }

                notifications = await response.json();
                renderList();
            }

            button.addEventListener('click', function () {
                const isVisible = panel.classList.toggle('is-visible');
                button.setAttribute('aria-expanded', String(isVisible));
            });

            eventSource.addEventListener('order-cancelled', function (event) {
                const notification = JSON.parse(event.data);
                notifications.unshift(notification);
                notifications = notifications.slice(0, 10);
                renderList();
                panel.classList.add('is-visible');
                button.setAttribute('aria-expanded', 'true');
            });

            list.addEventListener('click', async function (event) {
                const item = event.target.closest('.notification-item');
                if (!item) {
                    return;
                }

                const notificationId = item.getAttribute('data-id');
                window.location.href = '/notifications/' + notificationId + '/open';
            });

            document.addEventListener('click', function (event) {
                if (!event.target.closest('.notification-center')) {
                    panel.classList.remove('is-visible');
                    button.setAttribute('aria-expanded', 'false');
                }
            });

            eventSource.onerror = function () {
                closeEventSource();
            };

            if (logoutForm) {
                logoutForm.addEventListener('submit', closeEventSource);
            }

            window.addEventListener('beforeunload', closeEventSource);
            window.addEventListener('pagehide', closeEventSource);

            loadNotifications();
        })();
    </script>

</header>
