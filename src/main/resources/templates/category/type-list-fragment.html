<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="content">
    <section class="hero type-hero">
        <div class="hero-overlay">
            <p class="hero-eyebrow">Typed Stays</p>
            <h1 class="hero-copy" th:text="${pageTitle}">숙소 유형</h1>
            <p class="hero-subcopy" th:text="${pageDescription}">유형별 숙소 목록</p>
        </div>
    </section>

    <section class="accommodation accom-section type-accom-section">
        <div class="accom-section__head">
            <div>
                <p class="accom-section__eyebrow" th:text="${pageTitle} + ' Collection'">Collection</p>
                <h2 th:text="${pageTitle} + ' 숙소 목록'">숙소 목록</h2>
                <p class="accom-section__sub">현재 등록된 숙소 중 해당 유형만 모아 보여드립니다.</p>
            </div>
        </div>

        <section class="type-filter-panel">
            <form class="type-filter-form" method="get">
                <input type="text"
                       name="searchQuery"
                       placeholder="숙소명을 입력하세요"
                       th:value="${accomSearchDto != null ? accomSearchDto.searchQuery : ''}">
                <select name="grade">
                    <option value="">전체 등급</option>
                    <option value="ONE" th:selected="${accomSearchDto != null and accomSearchDto.grade != null and accomSearchDto.grade.name() == 'ONE'}">1등급</option>
                    <option value="TWO" th:selected="${accomSearchDto != null and accomSearchDto.grade != null and accomSearchDto.grade.name() == 'TWO'}">2등급</option>
                    <option value="THREE" th:selected="${accomSearchDto != null and accomSearchDto.grade != null and accomSearchDto.grade.name() == 'THREE'}">3등급</option>
                    <option value="FOUR" th:selected="${accomSearchDto != null and accomSearchDto.grade != null and accomSearchDto.grade.name() == 'FOUR'}">4등급</option>
                    <option value="FIVE" th:selected="${accomSearchDto != null and accomSearchDto.grade != null and accomSearchDto.grade.name() == 'FIVE'}">5등급</option>
                </select>
                <input type="number"
                       name="minPrice"
                       min="0"
                       step="1000"
                       placeholder="최소 가격"
                       th:value="${accomSearchDto != null and accomSearchDto.minPrice != null ? accomSearchDto.minPrice : ''}">
                <select name="minRating">
                    <option value="">전체 평점</option>
                    <option value="2.0" th:selected="${accomSearchDto != null and accomSearchDto.minRating != null and accomSearchDto.minRating == 2.0}">2.0 이상</option>
                    <option value="3.0" th:selected="${accomSearchDto != null and accomSearchDto.minRating != null and accomSearchDto.minRating == 3.0}">3.0 이상</option>
                    <option value="4.0" th:selected="${accomSearchDto != null and accomSearchDto.minRating != null and accomSearchDto.minRating == 4.0}">4.0 이상</option>
                    <option value="4.5" th:selected="${accomSearchDto != null and accomSearchDto.minRating != null and accomSearchDto.minRating == 4.5}">4.5 이상</option>
                </select>
                <div class="type-filter-actions">
                    <button type="submit">조회</button>
                </div>
            </form>
        </section>

        <div class="accom-grid" th:if="${accomList != null and !#lists.isEmpty(accomList)}">
            <article class="card accom-card" th:each="accom : ${accomList}">
                <div class="accom-card__visual">
                    <img class="accom-card__image"
                         th:if="${accom.imgUrl != null and !#strings.isEmpty(accom.imgUrl)}"
                         th:src="${accom.imgUrl}"
                         th:alt="${accom.accomName}">
                    <div class="accom-card__image-placeholder"
                         th:unless="${accom.imgUrl != null and !#strings.isEmpty(accom.imgUrl)}">
                        <span th:text="${accom.grade}">GRADE</span>
                    </div>
                </div>

                <div class="card-body accom-info">
                    <h3 class="accom-card__title" th:text="${accom.accomName}">숙소명</h3>
                    <div class="accom-card__rating">
                        <span class="accom-card__score"
                              th:text="${accom.avgRating != null ? #numbers.formatDecimal(accom.avgRating, 1, 1) : '0.0'}">0.0</span>
                        <div class="accom-card__rating-copy">
                            <strong th:text="${accom.grade}">등급</strong>
                            <span th:text="${accom.reviewCount != null ? #numbers.formatInteger(accom.reviewCount, 1, 'COMMA') + '개 후기' : '후기 0개'}">후기 0개</span>
                        </div>
                    </div>

                    <p class="accom-card__location" th:text="${accom.location}">위치</p>
                    <p class="desc accom-card__desc" th:text="${accom.accomDetail}">상세 설명</p>

                    <div class="card-bottom accom-card__bottom">
                        <div class="accom-card__price-wrap">
                            <span class="accom-card__price-label">1박 기준가</span>
                            <strong class="price"
                                    th:text="${#numbers.formatInteger(accom.pricePerNight, 3, 'COMMA')} + '원'">0원</strong>
                        </div>
                        <a class="reserve-btn" th:href="@{/accom/{accomId}(accomId=${accom.id})}">상세 보기</a>
                    </div>
                </div>
            </article>
        </div>

        <div class="type-empty-state" th:if="${accomList == null or #lists.isEmpty(accomList)}">
            <p th:text="${pageTitle} + ' 유형에 등록된 숙소가 없습니다.'">등록된 숙소가 없습니다.</p>
        </div>

        <div class="pager type-pager"
             th:if="${accomPage != null and accomPage.totalPages > 0}"
             th:with="currentPage=${accomPage.number + 1},
              totalPages=${accomPage.totalPages},
              startPage=${((currentPage - 1) / 5) * 5 + 1},
              endPage=${T(java.lang.Math).min(totalPages, startPage + 4)}">

            <span class="pager-nav pager-nav-disabled" th:if="${startPage <= 1}">이전 5개</span>
            <a class="pager-nav"
               th:if="${startPage > 1}"
               th:href="@{${currentPath}(page=${startPage - 1},
                              searchQuery=${accomSearchDto != null ? accomSearchDto.searchQuery : null},
                              grade=${accomSearchDto != null and accomSearchDto.grade != null ? accomSearchDto.grade.name() : null},
                              minPrice=${accomSearchDto != null ? accomSearchDto.minPrice : null},
                              minRating=${accomSearchDto != null ? accomSearchDto.minRating : null})}">이전 5개</a>

            <span class="pager-nav pager-nav-disabled" th:if="${!accomPage.hasPrevious()}">이전</span>
            <a class="pager-nav"
               th:if="${accomPage.hasPrevious()}"
               th:href="@{${currentPath}(page=${currentPage - 1},
                              searchQuery=${accomSearchDto != null ? accomSearchDto.searchQuery : null},
                              grade=${accomSearchDto != null and accomSearchDto.grade != null ? accomSearchDto.grade.name() : null},
                              minPrice=${accomSearchDto != null ? accomSearchDto.minPrice : null},
                              minRating=${accomSearchDto != null ? accomSearchDto.minRating : null})}">이전</a>

            <a th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
               th:classappend="${pageNum == currentPage} ? ' pager-current'"
               th:href="@{${currentPath}(page=${pageNum},
                              searchQuery=${accomSearchDto != null ? accomSearchDto.searchQuery : null},
                              grade=${accomSearchDto != null and accomSearchDto.grade != null ? accomSearchDto.grade.name() : null},
                              minPrice=${accomSearchDto != null ? accomSearchDto.minPrice : null},
                              minRating=${accomSearchDto != null ? accomSearchDto.minRating : null})}"
               th:text="${pageNum}">1</a>

            <span class="pager-nav pager-nav-disabled" th:if="${!accomPage.hasNext()}">다음</span>
            <a class="pager-nav"
               th:if="${accomPage.hasNext()}"
               th:href="@{${currentPath}(page=${currentPage + 1},
                              searchQuery=${accomSearchDto != null ? accomSearchDto.searchQuery : null},
                              grade=${accomSearchDto != null and accomSearchDto.grade != null ? accomSearchDto.grade.name() : null},
                              minPrice=${accomSearchDto != null ? accomSearchDto.minPrice : null},
                              minRating=${accomSearchDto != null ? accomSearchDto.minRating : null})}">다음</a>

            <span class="pager-nav pager-nav-disabled" th:if="${endPage >= totalPages}">다음 5개</span>
            <a class="pager-nav"
               th:if="${endPage < totalPages}"
               th:href="@{${currentPath}(page=${endPage + 1},
                              searchQuery=${accomSearchDto != null ? accomSearchDto.searchQuery : null},
                              grade=${accomSearchDto != null and accomSearchDto.grade != null ? accomSearchDto.grade.name() : null},
                              minPrice=${accomSearchDto != null ? accomSearchDto.minPrice : null},
                              minRating=${accomSearchDto != null ? accomSearchDto.minRating : null})}">다음 5개</a>
        </div>
    </section>
</th:block>
</body>
</html>
