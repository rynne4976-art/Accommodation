<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-common.css}">
</head>
<body>

<div th:replace="~{layouts/header :: header}"></div>

<main class="admin-wrap">
    <section class="admin-header">
        <span class="admin-label">Admin Console</span>
        <h1>관리자 페이지</h1>
        <p>회원, 숙소, 예약 관리를 각각 독립된 화면으로 분리해 운영할 수 있습니다.</p>
    </section>

    <section class="admin-grid">
        <article class="admin-card">
            <h2>회원 관리</h2>
            <p>회원 목록과 가입 정보를 확인하는 독립 화면으로 이동합니다.</p>
            <a th:href="@{/admin/members}">회원 관리로 이동</a>
        </article>

        <article class="admin-card">
            <h2>숙소 관리</h2>
            <p>숙소 등록, 수정, 삭제와 검색을 처리하는 독립 화면으로 이동합니다.</p>
            <a th:href="@{/admin/accoms}">숙소 관리로 이동</a>
        </article>

        <article class="admin-card">
            <h2>예약 관리</h2>
            <p>예약 내역과 상태를 확인하는 독립 화면으로 이동합니다.</p>
            <a th:href="@{/admin/orders}">예약 관리로 이동</a>
        </article>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>

</body>
</html>
