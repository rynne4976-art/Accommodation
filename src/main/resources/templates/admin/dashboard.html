<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-common.css}">
</head>
<body>

<div th:replace="~{layouts/header :: header}"></div>

<main class="page-wrap">
    <section class="page-header">
        <div class="page-header-copy">
            <span class="page-label">Admin Dashboard</span>
            <h2>관리자 대시보드</h2>
            <p>운영에 필요한 핵심 현황과 관리 메뉴를 한 화면에서 확인합니다.</p>
        </div>
    </section>

    <section class="dashboard-grid">
        <article class="dashboard-card">
            <span class="dashboard-card-label">총 회원 수</span>
            <strong th:text="${memberCount}">0</strong>
            <p>가입한 전체 회원 수입니다.</p>
            <a th:href="@{/admin/members}" class="dashboard-card-link">회원 관리로 이동</a>
        </article>
        <article class="dashboard-card">
            <span class="dashboard-card-label">등록 숙소 수</span>
            <strong th:text="${accomCount}">0</strong>
            <p>시스템에 등록된 숙소 수입니다.</p>
            <a th:href="@{/admin/accoms}" class="dashboard-card-link">숙소 관리로 이동</a>
        </article>
        <article class="dashboard-card">
            <span class="dashboard-card-label">예약 수</span>
            <strong th:text="${orderCount}">0</strong>
            <p>현재 생성된 예약 데이터 수입니다.</p>
            <a th:href="@{/admin/orders}" class="dashboard-card-link">예약 관리로 이동</a>
        </article>
    </section>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>

</body>
</html>
