<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>숙소 관리</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/admin-common.css}">
    <script defer th:src="@{/js/admin-list.js}"></script>
</head>
<body>

<div th:replace="~{layouts/header :: header}"></div>

<main class="page-wrap">
    <section class="page-header">
        <div class="page-header-copy">
            <span class="page-label">Admin Accommodations</span>
            <h2>숙소 관리</h2>
            <p>등록된 숙소의 상태와 상세 정보를 독립 관리자 화면에서 관리합니다.</p>
        </div>
        <div class="header-actions">
            <a th:href="@{/admin/accom/new(returnPage=${accomPage.number},returnSearchQuery=${accomSearchDto.searchQuery},returnAccomType=${accomSearchDto.accomType},returnGrade=${accomSearchDto.grade},returnAccomStatus=${accomSearchDto.accomStatus})}">숙소 등록</a>
        </div>
    </section>

    <div class="admin-list-shell" data-ajax-list data-update-selector=".admin-list-shell">
        <section class="search-panel">
            <form class="search-form"
                  data-ajax-form
                  th:action="@{/admin/accoms}"
                  method="get">
                <input type="text"
                       name="searchQuery"
                       placeholder="숙소명을 입력하십시오."
                       th:value="${accomSearchDto.searchQuery}">

                <select name="accomType">
                    <option value="">전체 유형</option>
                    <option value="HOTEL" th:selected="${accomSearchDto.accomType != null and accomSearchDto.accomType.name() == 'HOTEL'}">호텔</option>
                    <option value="MOTEL" th:selected="${accomSearchDto.accomType != null and accomSearchDto.accomType.name() == 'MOTEL'}">모텔</option>
                    <option value="PENSION" th:selected="${accomSearchDto.accomType != null and accomSearchDto.accomType.name() == 'PENSION'}">펜션</option>
                    <option value="RESORT" th:selected="${accomSearchDto.accomType != null and accomSearchDto.accomType.name() == 'RESORT'}">리조트</option>
                    <option value="GUESTHOUSE" th:selected="${accomSearchDto.accomType != null and accomSearchDto.accomType.name() == 'GUESTHOUSE'}">게스트하우스</option>
                </select>

                <select name="grade">
                    <option value="">전체 등급</option>
                    <option value="ONE" th:selected="${accomSearchDto.grade != null and accomSearchDto.grade.name() == 'ONE'}">1성급</option>
                    <option value="TWO" th:selected="${accomSearchDto.grade != null and accomSearchDto.grade.name() == 'TWO'}">2성급</option>
                    <option value="THREE" th:selected="${accomSearchDto.grade != null and accomSearchDto.grade.name() == 'THREE'}">3성급</option>
                    <option value="FOUR" th:selected="${accomSearchDto.grade != null and accomSearchDto.grade.name() == 'FOUR'}">4성급</option>
                    <option value="FIVE" th:selected="${accomSearchDto.grade != null and accomSearchDto.grade.name() == 'FIVE'}">5성급</option>
                </select>

                <select name="accomStatus">
                    <option value="">전체 상태</option>
                    <option value="OPEN" th:selected="${accomSearchDto.accomStatus != null and accomSearchDto.accomStatus.name() == 'OPEN'}">운영중</option>
                    <option value="CLOSED" th:selected="${accomSearchDto.accomStatus != null and accomSearchDto.accomStatus.name() == 'CLOSED'}">운영중지</option>
                    <option value="READY" th:selected="${accomSearchDto.accomStatus != null and accomSearchDto.accomStatus.name() == 'READY'}">준비중</option>
                </select>

                <button type="submit" data-reset-search>조회</button>
            </form>
        </section>

        <section class="table-panel">
        <table class="accom-table">
            <colgroup>
                <col style="width: 6%;">
                <col style="width: 16%;">
                <col style="width: 8%;">
                <col style="width: 8%;">
                <col style="width: 10%;">
                <col style="width: 8%;">
                <col style="width: 11%;">
                <col style="width: 13%;">
                <col style="width: 8%;">
                <col style="width: 6%;">
                <col style="width: 6%;">
            </colgroup>
            <thead>
            <tr>
                <th>번호</th>
                <th>숙소명</th>
                <th>유형</th>
                <th>등급</th>
                <th>가격</th>
                <th>객실 수</th>
                <th>투숙 가능 인원</th>
                <th>위치</th>
                <th>상태</th>
                <th>수정</th>
                <th>삭제</th>
            </tr>
            </thead>
            <tbody>
            <tr class="empty-row" th:if="${accomPage.totalElements == 0}">
                <td colspan="11">조회된 숙소가 없습니다.</td>
            </tr>
            <tr th:each="accom : ${accomPage.content}">
                <td th:text="${accom.id}"></td>
                <td>
                    <a class="cell-link" th:href="@{/accom/{id}(id=${accom.id})}" th:text="${accom.accomName}" th:title="${accom.accomName}"></a>
                </td>
                <td th:text="${accom.accomType}"></td>
                <td th:text="${accom.grade}"></td>
                <td th:text="${#numbers.formatInteger(accom.pricePerNight, 0, 'COMMA')} + '원'"></td>
                <td th:text="${accom.roomCount}"></td>
                <td th:text="${accom.guestCount} + '명'"></td>
                <td th:text="${accom.location}" th:title="${accom.location}"></td>
                <td>
                    <span class="status-badge" th:text="${accom.status}"></span>
                </td>
                <td>
                    <a class="table-link"
                       th:href="@{/admin/accom/{id}(id=${accom.id},returnPage=${accomPage.number},returnSearchQuery=${accomSearchDto.searchQuery},returnAccomType=${accomSearchDto.accomType},returnGrade=${accomSearchDto.grade},returnAccomStatus=${accomSearchDto.accomStatus})}">수정</a>
                </td>
                <td>
                    <a class="table-link"
                       th:href="@{/admin/accom/delete/{id}(id=${accom.id},returnPage=${accomPage.number},returnSearchQuery=${accomSearchDto.searchQuery},returnAccomType=${accomSearchDto.accomType},returnGrade=${accomSearchDto.grade},returnAccomStatus=${accomSearchDto.accomStatus})}"
                       onclick="return confirm('해당 숙소를 삭제하시겠습니까?');">삭제</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pager" th:if="${accomPage.totalPages > 0}"
             th:with="currentPage=${accomPage.number},
                      totalPages=${accomPage.totalPages},
                      startPage=${T(java.lang.Math).max(0, currentPage - 2)},
                      endPage=${T(java.lang.Math).min(totalPages - 1, startPage + 4)},
                      adjustedStart=${T(java.lang.Math).max(0, endPage - 4)}">
            <a class="pager-nav" th:if="${accomPage.hasPrevious()}"
               th:href="@{/admin/accoms(page=${accomPage.number - 1},searchQuery=${accomSearchDto.searchQuery},accomType=${accomSearchDto.accomType},grade=${accomSearchDto.grade},accomStatus=${accomSearchDto.accomStatus})}">이전</a>
            <span class="pager-nav pager-nav-disabled" th:unless="${accomPage.hasPrevious()}">이전</span>

            <a th:if="${adjustedStart > 0}"
               th:href="@{/admin/accoms(page=0,searchQuery=${accomSearchDto.searchQuery},accomType=${accomSearchDto.accomType},grade=${accomSearchDto.grade},accomStatus=${accomSearchDto.accomStatus})}">1</a>
            <span class="pager-ellipsis" th:if="${adjustedStart > 1}">...</span>

            <a th:each="pageNum : ${#numbers.sequence(adjustedStart, endPage)}"
               th:classappend="${pageNum == accomPage.number} ? ' pager-current'"
               th:href="@{/admin/accoms(page=${pageNum},searchQuery=${accomSearchDto.searchQuery},accomType=${accomSearchDto.accomType},grade=${accomSearchDto.grade},accomStatus=${accomSearchDto.accomStatus})}"
               th:text="${pageNum + 1}"></a>

            <span class="pager-ellipsis" th:if="${endPage < totalPages - 2}">...</span>
            <a th:if="${endPage < totalPages - 1}"
               th:href="@{/admin/accoms(page=${totalPages - 1},searchQuery=${accomSearchDto.searchQuery},accomType=${accomSearchDto.accomType},grade=${accomSearchDto.grade},accomStatus=${accomSearchDto.accomStatus})}"
               th:text="${totalPages}"></a>

            <a class="pager-nav" th:if="${accomPage.hasNext()}"
               th:href="@{/admin/accoms(page=${accomPage.number + 1},searchQuery=${accomSearchDto.searchQuery},accomType=${accomSearchDto.accomType},grade=${accomSearchDto.grade},accomStatus=${accomSearchDto.accomStatus})}">다음</a>
            <span class="pager-nav pager-nav-disabled" th:unless="${accomPage.hasNext()}">다음</span>
        </div>
        </section>
    </div>
</main>

<div th:replace="~{layouts/footer :: footer}"></div>

</body>
</html>
