<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>리뷰 전체보기</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/accomDtl.css}">
</head>
<body>
<div th:replace="~{layouts/header :: header}"></div>

<main class="accom-detail-page review-page">
    <section class="accom-detail-info-card review-page-hero">
        <div class="detail-section-header">
            <span class="accom-detail-label subtle">All Reviews</span>
            <h2 th:text="${accom.accomName} + ' 리뷰 전체보기'">리뷰 전체보기</h2>
        </div>

        <div class="review-section-card review-section-card-page">
            <div class="review-score-box">
                <strong>
                    <span class="review-score-star">★</span>
                    <span th:text="${#numbers.formatDecimal(accom.avgRating, 1, 1)}">0.0</span>
                    <small th:text="'(' + ${#numbers.formatInteger(accom.reviewCount, 1, 'COMMA')} + ')'">(0)</small>
                </strong>
            </div>

            <div class="review-summary-copy">
                <p th:text="${accom.location}">숙소 위치</p>
                <p>해당 숙박업소에 등록된 리뷰를 모두 확인할 수 있습니다.</p>
            </div>

            <a class="detail-action secondary" th:href="@{/accom/{accomId}(accomId=${accom.id})}">숙소로 돌아가기</a>
        </div>
    </section>

    <section class="accom-detail-info-card review-page-list">
        <div th:if="${reviewList != null and !#lists.isEmpty(reviewList)}" class="review-page-stack">
            <article class="review-page-card review-page-card-full" th:each="review : ${reviewList}">
                <div class="review-card-top">
                    <div class="review-page-headline">
                        <div class="review-card-stars" aria-label="회원 별점">
                            <span class="review-star"
                                  th:each="i : ${#numbers.sequence(1,5)}"
                                  th:classappend="${i <= review.rating} ? ' filled' : ''">★</span>
                        </div>
                        <p class="review-card-author" th:text="${review.member.name}">회원명</p>
                    </div>
                    <p class="review-card-date" th:text="${#temporals.format(review.regTime, 'yyyy.MM.dd')}">2026.04.02</p>
                </div>

                <div class="review-card-body review-card-body-page">
                    <div class="review-card-copy">
                        <p class="review-card-content review-card-content-page" th:text="${review.content}">리뷰 내용</p>
                    </div>
                </div>

                <div class="review-image-section"
                     th:if="${review.reviewImgList != null and !#lists.isEmpty(review.reviewImgList)}">
                    <div class="review-image-section-head">
                        <strong>리뷰 이미지</strong>
                        <span th:text="${#lists.size(review.reviewImgList)} + '장'">1장</span>
                    </div>

                    <div class="review-image-slider-shell">
                        <button type="button"
                                class="review-image-slider-button"
                                data-review-image-prev
                                th:if="${#lists.size(review.reviewImgList) > 5}">&lt;</button>

                        <div class="review-image-slider" data-review-image-slider>
                            <img th:each="img : ${review.reviewImgList}"
                                 class="review-image-slider-item"
                                 th:src="${img.imgUrl}"
                                 th:attr="data-review-modal-image=${img.imgUrl},data-review-modal-group=${review.id}"
                                 alt="리뷰 이미지">
                        </div>

                        <button type="button"
                                class="review-image-slider-button"
                                data-review-image-next
                                th:if="${#lists.size(review.reviewImgList) > 5}">&gt;</button>
                    </div>
                </div>
            </article>
        </div>

        <div class="review-empty-card review-empty-inline" th:if="${reviewList == null or #lists.isEmpty(reviewList)}">
            <p>등록된 리뷰가 없습니다.</p>
        </div>

        <div class="pager review-pager"
             th:if="${reviewPage != null and reviewPage.totalPages > 0}"
             th:with="currentPage=${reviewPage.number + 1},
                      totalPages=${reviewPage.totalPages},
                      startPage=${((currentPage - 1) / 5) * 5 + 1},
                      endPage=${T(java.lang.Math).min(totalPages, startPage + 4)}">

            <span class="pager-nav pager-nav-disabled" th:if="${startPage <= 1}">이전 5개</span>
            <a class="pager-nav"
               th:if="${startPage > 1}"
               th:href="@{${currentPath}(page=${startPage - 1})}">이전 5개</a>

            <span class="pager-nav pager-nav-disabled" th:if="${!reviewPage.hasPrevious()}">이전</span>
            <a class="pager-nav"
               th:if="${reviewPage.hasPrevious()}"
               th:href="@{${currentPath}(page=${currentPage - 1})}">이전</a>

            <a th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
               th:classappend="${pageNum == currentPage} ? ' pager-current'"
               th:href="@{${currentPath}(page=${pageNum})}"
               th:text="${pageNum}">1</a>

            <span class="pager-nav pager-nav-disabled" th:if="${!reviewPage.hasNext()}">다음</span>
            <a class="pager-nav"
               th:if="${reviewPage.hasNext()}"
               th:href="@{${currentPath}(page=${currentPage + 1})}">다음</a>

            <span class="pager-nav pager-nav-disabled" th:if="${endPage >= totalPages}">다음 5개</span>
            <a class="pager-nav"
               th:if="${endPage < totalPages}"
               th:href="@{${currentPath}(page=${endPage + 1})}">다음 5개</a>
        </div>
    </section>
</main>

<div id="reviewImageViewerModal" class="review-modal review-image-viewer-modal" aria-hidden="true">
    <div class="review-modal-backdrop" data-review-image-close></div>

    <div class="review-modal-dialog review-image-viewer-dialog" role="dialog" aria-modal="true" aria-label="리뷰 이미지 전체보기">
        <button type="button" class="review-modal-close" data-review-image-close>닫기</button>

        <div class="review-image-viewer-shell">
            <button type="button" class="review-image-viewer-nav" data-review-image-modal-prev>&lt;</button>
            <img id="reviewImageViewerTarget" class="review-image-viewer-target" alt="리뷰 확대 이미지">
            <button type="button" class="review-image-viewer-nav" data-review-image-modal-next>&gt;</button>
        </div>
    </div>
</div>

<div th:replace="~{layouts/footer :: footer}"></div>
<script th:src="@{/js/review-list-slider.js}"></script>
</body>
</html>
