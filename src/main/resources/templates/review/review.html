<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layouts}">
<head>
    <meta charset="UTF-8">
    <title>숙소 리뷰</title>
    <link rel="stylesheet" th:href="@{/css/review.css}">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<div layout:fragment="content">
    <div class="review-section">

        <div class="review-header-box">
            <div>
                <h2 th:text="${accom.accomName} + ' 리뷰'">숙소 리뷰</h2>
                <p class="mb-0">
                    평균 별점:
                    <strong th:text="${#numbers.formatDecimal(accom.avgRating, 1, 1)}">0.0</strong>
                    /
                    리뷰 수:
                    <strong th:text="${accom.reviewCount}">0</strong>
                </p>
            </div>

            <div style="display:flex; gap:10px;">
                <a th:href="@{/accom/{accomId}(accomId=${accom.id})}" class="btn btn-outline">숙소 상세로</a>

                <button type="button"
                        class="btn btn-primary"
                        th:if="${!hasMyReview}"
                        onclick="openReviewModal()">
                    리뷰 작성
                </button>

                <button type="button"
                        class="btn btn-secondary"
                        th:if="${hasMyReview}"
                        onclick="openEditReviewModal()">
                    내 리뷰 수정
                </button>
            </div>
        </div>

        <div class="review-summary-box">
            <p th:if="${!hasMyReview}">
                아직 이 숙소에 작성한 리뷰가 없습니다.
            </p>
            <p th:if="${hasMyReview}">
                이미 이 숙소에 리뷰를 작성했습니다. 수정 또는 삭제가 가능합니다.
            </p>
        </div>

        <div class="review-list" th:if="${reviewList != null and !#lists.isEmpty(reviewList)}">
            <div class="review-card" th:each="review : ${reviewList}">
                <div class="review-top">
                    <div>
                        <p>
                            <strong>작성자:</strong>
                            <span th:text="${review.member.name}">회원명</span>
                        </p>

                        <p>
                            <strong>별점:</strong>
                            <span class="star-display" th:attr="data-rating=${review.rating}"></span>
                        </p>

                        <p>
                            <strong>작성일:</strong>
                            <span th:text="${#temporals.format(review.regTime, 'yyyy-MM-dd HH:mm')}"></span>
                        </p>
                    </div>

                    <div class="review-action-group"
                         th:if="${loginMemberId != null and review.member.id == loginMemberId}">
                        <button type="button"
                                class="btn btn-secondary"
                                th:if="${myReview != null and myReview.id == review.id}"
                                onclick="openEditReviewModal()">
                            수정
                        </button>

                        <button type="button"
                                class="btn btn-danger"
                                th:if="${myReview != null and myReview.id == review.id}"
                                th:attr="data-review-id=${review.id}, data-accom-id=${accom.id}"
                                onclick="deleteReview(this)">
                            삭제
                        </button>
                    </div>
                </div>

                <p><strong>내용:</strong> <span th:text="${review.content}"></span></p>

                <div th:if="${review.reviewImgList != null and !#lists.isEmpty(review.reviewImgList)}"
                     class="review-image-box">
                    <img th:each="img : ${review.reviewImgList}"
                         th:src="${img.imgUrl}"
                         alt="리뷰 이미지">
                </div>
            </div>
        </div>

        <div class="empty-box" th:if="${reviewList == null or #lists.isEmpty(reviewList)}">
            아직 등록된 리뷰가 없습니다.
        </div>
    </div>

    <!-- 리뷰 작성 모달 -->
    <div id="reviewModal" class="review-modal">
        <div class="review-modal-content">
            <div class="review-modal-header">
                <h3>리뷰 작성</h3>
                <button type="button" class="modal-close-btn" onclick="closeReviewModal()">×</button>
            </div>

            <form id="writeReviewForm"
                  th:object="${reviewFormDto}"
                  enctype="multipart/form-data"
                  class="review-form">

                <input type="hidden" th:field="*{accomId}">
                <input type="hidden" th:field="*{rating}" id="writeRating">

                <div class="form-group">
                    <label>별점</label>
                    <div class="star-rating" id="writeStarRating">
                        <span onclick="setRating(1, 'write')">★</span>
                        <span onclick="setRating(2, 'write')">★</span>
                        <span onclick="setRating(3, 'write')">★</span>
                        <span onclick="setRating(4, 'write')">★</span>
                        <span onclick="setRating(5, 'write')">★</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="writeContent">리뷰 내용</label>
                    <textarea th:field="*{content}"
                              id="writeContent"
                              rows="6"
                              placeholder="숙소 이용 후기를 작성해 주세요."></textarea>
                </div>

                <div class="form-group">
                    <label for="writeReviewImgFileList">리뷰 이미지</label>
                    <input type="file"
                           th:field="*{reviewImgFileList}"
                           id="writeReviewImgFileList"
                           accept="image/*"
                           multiple
                           onchange="previewMultipleImages(this, 'writePreviewList')">

                    <div id="writePreviewList" class="multi-preview-box"></div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="closeReviewModal()">취소</button>
                    <button type="button" class="btn btn-primary" onclick="submitWriteReview()">리뷰 등록</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 리뷰 수정 모달 -->
    <div id="editReviewModal" class="review-modal" th:if="${myReview != null}">
        <div class="review-modal-content">
            <div class="review-modal-header">
                <h3>리뷰 수정</h3>
                <button type="button" class="modal-close-btn" onclick="closeEditReviewModal()">×</button>
            </div>

            <form id="editReviewForm"
                  enctype="multipart/form-data"
                  class="review-form"
                  th:if="${myReview != null}">

                <input type="hidden" name="accomId" th:value="${accom.id}">
                <input type="hidden" name="rating" id="editRating" th:value="${myReview.rating}">
                <input type="hidden" name="reviewId" th:value="${myReview.id}" id="editReviewId">

                <div class="form-group">
                    <label>별점</label>
                    <div class="star-rating" id="editStarRating">
                        <span onclick="setRating(1, 'edit')">★</span>
                        <span onclick="setRating(2, 'edit')">★</span>
                        <span onclick="setRating(3, 'edit')">★</span>
                        <span onclick="setRating(4, 'edit')">★</span>
                        <span onclick="setRating(5, 'edit')">★</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="editContent">리뷰 내용</label>
                    <textarea name="content"
                              id="editContent"
                              rows="6"
                              placeholder="숙소 이용 후기를 작성해 주세요."
                              th:text="${myReview.content}"></textarea>
                </div>

                <div class="form-group">
                    <label>기존 리뷰 이미지</label>

                    <div class="edit-existing-image-list"
                         th:if="${myReview.reviewImgList != null and !#lists.isEmpty(myReview.reviewImgList)}">

                        <div class="edit-existing-image-item"
                             th:each="img : ${myReview.reviewImgList}">
                            <img th:src="${img.imgUrl}" alt="기존 리뷰 이미지">

                            <button type="button"
                                    class="btn btn-danger"
                                    th:attr="data-review-id=${myReview.id},
                                             data-review-img-id=${img.id},
                                             data-accom-id=${accom.id}"
                                    onclick="deleteReviewImage(this)">
                                이미지 삭제
                            </button>
                        </div>
                    </div>

                    <div class="empty-box"
                         th:if="${myReview.reviewImgList == null or #lists.isEmpty(myReview.reviewImgList)}">
                        등록된 리뷰 이미지가 없습니다.
                    </div>
                </div>

                <div class="form-group">
                    <label for="editReviewImgFileList">리뷰 이미지 추가</label>
                    <input type="file"
                           name="reviewImgFileList"
                           id="editReviewImgFileList"
                           accept="image/*"
                           multiple
                           onchange="previewMultipleImages(this, 'editPreviewList')">

                    <div id="editPreviewList" class="multi-preview-box"></div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="closeEditReviewModal()">취소</button>
                    <button type="button" class="btn btn-primary" onclick="submitEditReview()">리뷰 수정</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        function getCsrfHeader() {
            return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        }

        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]').getAttribute('content');
        }

        function openReviewModal() {
            const modal = document.getElementById("reviewModal");
            if (modal) {
                modal.style.display = "flex";
                document.body.style.overflow = "hidden";
            }
        }

        function closeReviewModal() {
            const modal = document.getElementById("reviewModal");
            if (modal) {
                modal.style.display = "none";
                document.body.style.overflow = "auto";
            }
        }

        function openEditReviewModal() {
            const modal = document.getElementById("editReviewModal");
            if (modal) {
                modal.style.display = "flex";
                document.body.style.overflow = "hidden";
            }
        }

        function closeEditReviewModal() {
            const modal = document.getElementById("editReviewModal");
            if (modal) {
                modal.style.display = "none";
                document.body.style.overflow = "auto";
            }
        }

        function setRating(value, mode) {
            if (mode === "write") {
                const input = document.getElementById("writeRating");
                if (input) {
                    input.value = value;
                }
                paintStars("writeStarRating", value);
            } else {
                const input = document.getElementById("editRating");
                if (input) {
                    input.value = value;
                }
                paintStars("editStarRating", value);
            }
        }

        function paintStars(containerId, value) {
            const container = document.getElementById(containerId);
            if (!container) {
                return;
            }

            const stars = container.querySelectorAll("span");
            stars.forEach((star, index) => {
                if (index < value) {
                    star.classList.add("active");
                } else {
                    star.classList.remove("active");
                }
            });
        }

        function previewMultipleImages(input, previewContainerId) {
            const previewContainer = document.getElementById(previewContainerId);

            if (!previewContainer) {
                return;
            }

            previewContainer.innerHTML = "";

            if (!input || !input.files || input.files.length === 0) {
                return;
            }

            Array.from(input.files).forEach(file => {
                const reader = new FileReader();

                reader.onload = function(e) {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.alt = "리뷰 이미지 미리보기";
                    previewContainer.appendChild(img);
                };

                reader.readAsDataURL(file);
            });
        }

        async function submitWriteReview() {
            const form = document.getElementById("writeReviewForm");
            const formData = new FormData(form);

            try {
                const response = await fetch("/reviews/new", {
                    method: "POST",
                    body: formData,
                    headers: {
                        [getCsrfHeader()]: getCsrfToken()
                    }
                });

                const data = await response.json();
                alert(data.message);

                if (data.success) {
                    window.location.href = "/review/accom/" + data.accomId;
                }
            } catch (e) {
                alert("리뷰 등록 중 오류가 발생했습니다.");
            }
        }

        async function submitEditReview() {
            const form = document.getElementById("editReviewForm");
            const reviewId = document.getElementById("editReviewId").value;
            const formData = new FormData(form);

            try {
                const response = await fetch("/reviews/" + reviewId + "/update", {
                    method: "POST",
                    body: formData,
                    headers: {
                        [getCsrfHeader()]: getCsrfToken()
                    }
                });

                const data = await response.json();
                alert(data.message);

                if (data.success) {
                    window.location.href = "/review/accom/" + data.accomId;
                }
            } catch (e) {
                alert("리뷰 수정 중 오류가 발생했습니다.");
            }
        }

        async function deleteReview(button) {
            if (!confirm("리뷰를 삭제하시겠습니까?")) {
                return;
            }

            const reviewId = button.getAttribute("data-review-id");
            const accomId = button.getAttribute("data-accom-id");

            const formData = new FormData();
            formData.append("accomId", accomId);

            try {
                const response = await fetch("/reviews/" + reviewId + "/delete", {
                    method: "POST",
                    body: formData,
                    headers: {
                        [getCsrfHeader()]: getCsrfToken()
                    }
                });

                const data = await response.json();
                alert(data.message);

                if (data.success) {
                    window.location.href = "/review/accom/" + data.accomId;
                }
            } catch (e) {
                alert("리뷰 삭제 중 오류가 발생했습니다.");
            }
        }

        async function deleteReviewImage(button) {
            if (!confirm("이 이미지를 삭제하시겠습니까?")) {
                return;
            }

            const reviewId = button.getAttribute("data-review-id");
            const reviewImgId = button.getAttribute("data-review-img-id");
            const accomId = button.getAttribute("data-accom-id");

            const formData = new FormData();
            formData.append("accomId", accomId);

            try {
                const response = await fetch("/reviews/" + reviewId + "/images/" + reviewImgId + "/delete", {
                    method: "POST",
                    body: formData,
                    headers: {
                        [getCsrfHeader()]: getCsrfToken()
                    }
                });

                const data = await response.json();
                alert(data.message);

                if (data.success) {
                    window.location.href = "/review/accom/" + data.accomId;
                }
            } catch (e) {
                alert("리뷰 이미지 삭제 중 오류가 발생했습니다.");
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const writeRating = document.getElementById("writeRating");
            if (writeRating && writeRating.value) {
                paintStars("writeStarRating", parseInt(writeRating.value));
            }

            const editRating = document.getElementById("editRating");
            if (editRating && editRating.value) {
                paintStars("editStarRating", parseInt(editRating.value));
            }

            const starDisplays = document.querySelectorAll(".star-display");
            starDisplays.forEach(function(el) {
                const rating = parseInt(el.dataset.rating || "0");
                let stars = "";

                for (let i = 1; i <= 5; i++) {
                    stars += i <= rating ? "★" : "☆";
                }

                el.textContent = stars;
            });
        });

        window.onclick = function(event) {
            const reviewModal = document.getElementById("reviewModal");
            const editReviewModal = document.getElementById("editReviewModal");

            if (reviewModal && event.target === reviewModal) {
                closeReviewModal();
            }

            if (editReviewModal && event.target === editReviewModal) {
                closeEditReviewModal();
            }
        };
    </script>
</div>
</html>
