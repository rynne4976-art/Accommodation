# ── 영역 1: 이름표 ──────────────────────────
# GitHub Actions 탭에 표시될 이름 (아무 이름이나 OK)
name: Spring Boot CI

# ── 영역 2: 언제 실행? ────────────────────────
# on = "~할 때". 영어로 "on push" = "push 할 때"
on:
  # push = 코드를 GitHub에 올리는 것
  push:
    # branches = 어떤 브랜치(코드 갈래)에 올릴 때 실행할지
    # main = 최종 코드, develop = 개발 중인 코드
    branches: [ main, develop ]
  # pull_request = "이 코드를 합쳐주세요" 요청을 만들 때
  pull_request:
    branches: [ main, develop ]

# ── 영역 3: 어디서 실행? ──────────────────────
# jobs = 할 일 목록
jobs:
  # build = 이 할 일의 이름 (빌드+테스트라는 뜻)
  build:
    # runs-on = 어떤 컴퓨터에서 실행할지
    # ubuntu-latest = GitHub이 무료로 빌려주는 리눅스 컴퓨터
    runs-on: ubuntu-latest

    # ── 영역 4: 무엇을 할 것인가? (순서대로 실행) ──
    # steps = 단계들. 위에서 아래로 순서대로 실행됨
    steps:
      # Step 1: GitHub 저장소에서 코드를 다운로드
      # uses = 다른 사람이 만든 도구를 가져다 쓰는 것
      # actions/checkout = GitHub 공식 "코드 다운로드" 도구
      # @v4 = 이 도구의 4번째 버전
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # Step 2: Java 17 설치 (우리 프로젝트가 Java 17이므로)
      # actions/setup-java = GitHub 공식 "Java 설치" 도구
      - name: JDK 21 설치
        uses: actions/setup-java@v4
        # with = 이 도구에 전달할 설정값
        with:
          # java-version = 설치할 Java 버전 (우리 프로젝트: 17)
          java-version: '17'
          # distribution = Java 배포판 이름
          # temurin = Adoptium이 만든 무료 Java (가장 많이 사용됨)
          distribution: 'temurin'

      # Step 3: gradlew 파일에 실행 권한 부여
      # run = 터미널 명령어를 직접 실행
      # chmod +x = "이 파일을 실행할 수 있게 해줘" (리눅스 전용 명령어)
      # 윈도우에선 필요 없지만, CI는 리눅스에서 돌아가므로 필요!
      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      # Step 4: 드디어 빌드! (코드 컴파일 + 테스트 실행)
      # ./gradlew build = "프로젝트를 빌드해줘" 명령어
      # H2는 내장 DB → 외부 DB 접속 정보(env:) 불필요!
      - name: Gradle 빌드
        run: ./gradlew build